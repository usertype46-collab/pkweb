<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烤漆部粉體雲端管理系統 v3.0 (Firebase版)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --primary-color: #2c3e50; --accent-color: #3498db; --danger-color: #e74c3c;
            --success-color: #2ecc71; --warning-color: #f39c12;
            --bg-gradient: linear-gradient(135deg, #e0eafc, #cfdef3);
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; color: #333; padding: 15px; font-size: 16px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 20px; min-height: 90vh; display: flex; flex-direction: column; position: relative; }
        
        /* 登入畫面 */
        #loginOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card-bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; padding: 20px; }
        .login-box { text-align: center; width: 100%; }
        
        /* 權限控制：檢視者模式隱藏管理員元素 */
        body.viewer-mode .admin-only { display: none !important; }
        
        .main-title { font-size: 26px; font-weight: 800; color: var(--primary-color); margin: 15px 0 25px 0; padding-bottom: 10px; border-bottom: 3px double var(--accent-color); text-align: center; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .menu-item { background: #ffffff; color: var(--primary-color); padding: 14px 20px; border-radius: 12px; display: flex; justify-content: space-between; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border-left: 5px solid var(--accent-color); cursor: pointer; font-weight: 700; }
        .menu-item:hover { transform: translateY(-2px); background: #fafafa; }
        
        .btn { background: linear-gradient(135deg, var(--primary-color), #34495e); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 5px;}
        .btn-danger { background: linear-gradient(135deg, var(--danger-color), #c0392b); }
        .btn-success { background: linear-gradient(135deg, var(--success-color), #27ae60); }
        .btn-secondary { background: #7f8c8d; }
        
        .page { display: none; }
        .page-title { font-size: 18px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-color); display: flex; justify-content: space-between; align-items: center; }
        .card-form { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 10px; display: flex; align-items: center; }
        .form-group label { width: 35%; font-weight: 600; font-size: 14px; color: #475569; }
        .form-group input, .form-group select { width: 65%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .form-group input[readonly] { background-color: #e2e8f0; }
        
        .file-ops { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; background: #e2e8f0; padding: 10px; border-radius: 8px; }
        .data-container { margin-top: 15px; max-height: 250px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 8px; background: white; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td { padding: 8px; border-bottom: 1px solid #edf2f7; text-align: left; }
        .data-table th { background-color: #f1f5f9; position: sticky; top: 0; }
        
        .action-btn { padding: 4px 8px; border-radius: 4px; cursor: pointer; border: none; margin-right: 2px; }
        .act-edit { background: #e0f2fe; color: #0369a1; }
        .act-del { background: #fee2e2; color: #b91c1c; }
        .red-bold { color: var(--danger-color); font-weight: bold; }
        #authStatus { text-align: center; font-size: 14px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="loginOverlay">
        <div class="login-box">
            <h2>☁️ 粉體雲端管理系統</h2>
            <p style="margin: 15px 0; color: #666; font-size: 14px;">請選擇登入身分</p>
            <button class="btn btn-success" onclick="login('admin')">管理員登入 (需密碼)</button>
            <button class="btn btn-secondary" style="margin-top: 15px;" onclick="login('viewer')">檢視者登入 (唯讀)</button>
        </div>
    </div>

    <div id="homePage" class="page" style="display: none; flex-direction: column; flex-grow: 1;">
        <div class="main-title">⚙️ 烤漆部粉體系統</div>
        <div class="menu-list">
            <div class="menu-item" onclick="goPage(1)">1. 烤漆粉號清冊</div>
            <div class="menu-item" onclick="goPage(2)">2. 即時庫存監控</div>
            <div class="menu-item" onclick="goPage(3)">3. 採購入庫流水帳</div>
            <div class="menu-item" onclick="goPage(4)">4. 出庫用量紀錄</div>
            <div class="menu-item" onclick="goPage(5)">5. 用量紀錄查詢</div>
            <div class="menu-item" onclick="goPage(6)">6. 庫存快速查詢</div>
            <div class="menu-item" onclick="goPage(7)">7. 廢粉回收紀錄</div>
            <div class="menu-item" onclick="goPage(8)">8. 廢粉數據分析</div>
        </div>
        <div id="authStatus"></div>
        <button class="btn btn-secondary admin-only" onclick="syncData()">強制雲端同步</button>
    </div>

    <div id="page1" class="page">
        <div class="page-title"><span>1. 烤漆粉號清冊</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form admin-only">
            <div class="form-group"><label>粉號：</label><input type="text" id="p1_id"></div>
            <div class="form-group"><label>代號：</label><input type="text" id="p1_code"></div>
            <div class="form-group"><label>色系：</label><input type="text" id="p1_color"></div>
            <div class="form-group"><label>淨重：</label><select id="p1_weight"><option value="20">20</option><option value="25" selected>25</option></select></div>
            <button class="btn btn-success" onclick="addP1Record()">儲存粉號</button>
            <button class="btn btn-danger" onclick="deleteP1Record()">刪除粉號</button>
        </div>
        <div class="file-ops admin-only"><input type="file" id="p1_file" accept=".csv" style="grid-column: span 2;"><button class="btn" onclick="importCSV('powder')">匯入CSV</button><button class="btn" onclick="exportCSV('powder')">匯出CSV</button></div>
        <div class="data-container"><table class="data-table" id="p1_table"><thead><tr><th>粉號</th><th>代號</th><th>規格</th><th class="admin-only">操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="page2" class="page">
        <div class="page-title"><span>2. 即時庫存監控</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form admin-only">
            <div class="form-group"><label>粉號：</label><select id="p2_id" onchange="linkP2Fields()"></select></div>
            <div class="form-group"><label>箱數：</label><input type="number" id="p2_box" oninput="calcP2Total()"></div>
            <div class="form-group"><label>散粉：</label><input type="number" id="p2_loose" oninput="calcP2Total()"></div>
            <div class="form-group"><label>總數量(kg)：</label><input type="text" id="p2_total" readonly></div>
            <button class="btn btn-success" onclick="saveP2Record()">盤點寫入</button>
        </div>
        <div class="file-ops admin-only"><input type="file" id="p2_file" accept=".csv" style="grid-column: span 2;"><button class="btn" onclick="importCSV('inventory')">匯入CSV</button><button class="btn" onclick="exportCSV('inventory')">匯出CSV</button></div>
        <div class="data-container"><table class="data-table" id="p2_table"><thead><tr><th>粉號</th><th>總量(kg)</th><th>安全值</th><th class="admin-only">操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="page3" class="page">
        <div class="page-title"><span>3. 採購入庫流水帳</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form admin-only">
            <div class="form-group"><label>日期：</label><input type="date" id="p3_date"></div>
            <div class="form-group"><label>粉號：</label><select id="p3_id"></select></div>
            <div class="form-group"><label>進貨箱數：</label><input type="number" id="p3_box" value="0"></div>
            <div class="form-group"><label>進貨散粉：</label><input type="number" id="p3_loose" value="0"></div>
            <button class="btn btn-success" onclick="saveP3Record()">確認入庫</button>
        </div>
        <div class="file-ops admin-only"><input type="file" id="p3_file" accept=".csv" style="grid-column: span 2;"><button class="btn" onclick="importCSV('purchase')">匯入CSV</button><button class="btn" onclick="exportCSV('purchase')">匯出CSV</button></div>
        <div class="data-container"><table class="data-table" id="p3_table"><thead><tr><th>日期</th><th>粉號</th><th>追加箱/散</th><th class="admin-only">操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="page4" class="page">
        <div class="page-title"><span>4. 出庫用量紀錄</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form admin-only">
            <div class="form-group"><label>日期：</label><input type="date" id="p4_date"></div>
            <div class="form-group"><label>粉號：</label><select id="p4_id" onchange="linkP4Fields()"></select></div>
            <div class="form-group"><label>當前庫存：</label><input type="text" id="p4_stock" readonly style="color:var(--danger-color); font-weight:bold;"></div>
            <div class="form-group"><label>扣除箱數：</label><input type="number" id="p4_box" value="0"></div>
            <div class="form-group"><label>扣除散粉：</label><input type="number" id="p4_loose" value="0"></div>
            <div class="form-group"><label>回庫散粉：</label><input type="number" id="p4_return" value="0"></div>
            <button class="btn btn-success" onclick="saveP4Record()">確認出庫</button>
        </div>
        <div class="file-ops admin-only"><input type="file" id="p4_file" accept=".csv" style="grid-column: span 2;"><button class="btn" onclick="importCSV('usage')">匯入CSV</button><button class="btn" onclick="exportCSV('usage')">匯出CSV</button></div>
        <div class="data-container"><table class="data-table" id="p4_table"><thead><tr><th>日期</th><th>粉號</th><th>實際用量</th><th class="admin-only">操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="page5" class="page">
        <div class="page-title"><span>5. 用量紀錄查詢</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form"><div class="form-group"><label>選擇日期：</label><select id="p5_date" onchange="queryP5()"></select></div></div>
        <button class="btn btn-secondary admin-only" onclick="exportCSV('usage')">匯出全部用量CSV</button>
        <div class="data-container"><table class="data-table" id="p5_table"><thead><tr><th>粉號</th><th>代號</th><th>用量(kg)</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="page6" class="page">
        <div class="page-title"><span>6. 庫存快速查詢</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form"><div class="form-group"><label>選擇品項：</label><select id="p6_select" onchange="queryP6()"></select></div></div>
        <div id="p6_result" style="display:none; background:#fff5f5; padding:15px; border-radius:8px; border:1px solid #feb2b2; margin-top:15px;"></div>
    </div>

    <div id="page7" class="page">
        <div class="page-title"><span>7. 廢粉回收紀錄</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form admin-only">
            <div class="form-group"><label>日期：</label><input type="date" id="p7_date"></div>
            <div class="form-group"><label>數量(箱桶)：</label><input type="number" id="p7_qty"></div>
            <button class="btn btn-success" onclick="saveP7Record()">新增廢粉紀錄</button>
        </div>
        <div class="file-ops admin-only"><input type="file" id="p7_file" accept=".csv" style="grid-column: span 2;"><button class="btn" onclick="importCSV('waste')">匯入CSV</button><button class="btn" onclick="exportCSV('waste')">匯出CSV</button></div>
        <div class="data-container"><table class="data-table" id="p7_table"><thead><tr><th>日期</th><th>數量</th><th>總重(kg)</th><th class="admin-only">操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="page8" class="page">
        <div class="page-title"><span>8. 廢粉數據分析</span><button class="btn btn-secondary" style="width:auto; padding:5px 12px;" onclick="goHome()">返回</button></div>
        <div class="card-form" style="background:#fffdf0; border-color:#fef3c7;">
            <h4 style="margin-bottom:10px;">📊 廢粉重量分析</h4>
            <p>日平均: <span id="avg_day" class="red-bold">0</span> kg</p>
            <p>本期累計: <span id="p8_cum_ton" class="red-bold">0</span> 噸</p>
        </div>
        <div id="p8_alert_box" style="padding:10px; border-radius:6px; text-align:center; font-weight:bold; background:#e0f2fe; color:#0369a1; margin-bottom:15px;"></div>
        <button class="btn btn-warning admin-only" onclick="resetP8()">重置倒數計算 (已回收清運)</button>
    </div>

</div>

<script>
    // ========================================================
    // 1. Firebase 初始化 (請替換為你的 Firebase Config)
    // ========================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDTIMGBYqAqOpFcCqEMjWWUwC_nPAfQ9ko",
        authDomain: "paint-system-21867.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "paint-system-21867",
        storageBucket: "paint-system-21867.firebasestorage.app",
        messagingSenderId: "855614444799",
        appId: "1:855614444799:web:db649669302532ea4aa8ca"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ========================================================
    // 2. 全域變數與權限控制
    // ========================================================
    const ADMIN_PASS = "M0282";
    let isAdmin = false;
    let db = { powder: {}, inventory: {}, purchase: [], usage: [], waste: [], settings: { p8_reset_time: 0 } };

    function login(role) {
        if (role === 'admin') {
            let pw = prompt("請輸入管理員密碼：");
            if (pw !== ADMIN_PASS) return alert("密碼錯誤！");
            isAdmin = true;
            document.body.classList.remove('viewer-mode');
            document.getElementById('authStatus').innerText = "當前權限：管理員 (具備讀寫權限)";
        } else {
            isAdmin = false;
            document.body.classList.add('viewer-mode');
            document.getElementById('authStatus').innerText = "當前權限：檢視者 (唯讀模式)";
        }
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('homePage').style.display = 'flex';
        initSystem();
    }

    // ========================================================
    // 3. 雲端資料庫讀寫
    // ========================================================
    function initSystem() {
        const today = new Date().toISOString().split('T')[0];
        ['p3_date', 'p4_date', 'p7_date'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = today; });
        
        // 監聽 Firebase 資料變化 (即時同步)
        database.ref('/').on('value', (snapshot) => {
            if (snapshot.exists()) {
                let data = snapshot.val();
                db.powder = data.powder || {}; db.inventory = data.inventory || {};
                db.purchase = data.purchase || []; db.usage = data.usage || [];
                db.waste = data.waste || []; db.settings = data.settings || { p8_reset_time: 0 };
            }
            refreshAllUI();
        });
    }

    function syncData() {
        if(!isAdmin) return;
        database.ref('/').set(db).then(() => {
            console.log("雲端同步成功");
        }).catch(err => alert("同步失敗: " + err));
    }

    // ========================================================
    // 4. UI 介面控制
    // ========================================================
    function goPage(pageId) { 
        document.getElementById("homePage").style.display = "none"; 
        for (let i = 1; i <= 8; i++) document.getElementById("page" + i).style.display = (i === pageId) ? "block" : "none"; 
        if(pageId === 5) refreshP5(); if(pageId === 8) calcWasteStats(); 
    }
    function goHome() { 
        for (let i = 1; i <= 8; i++) document.getElementById("page" + i).style.display = "none"; 
        document.getElementById("homePage").style.display = "flex"; 
    }
    
    function refreshAllUI() {
        refreshDropdowns(); renderP1(); renderP2(); renderP3(); renderP4(); renderP7();
    }

    function refreshDropdowns() {
        let opts = '<option value="">請選擇...</option>';
        for (let id in db.powder) opts += `<option value="${id}">${id} (${db.powder[id].code})</option>`;
        ['p2_id','p3_id','p4_id','p6_select'].forEach(el => {
            if(document.getElementById(el)) document.getElementById(el).innerHTML = opts;
        });
    }

    // ========================================================
    // 5. 各模組核心邏輯 (與 Firebase 結合)
    // ========================================================
    // P1: 粉號
    function addP1Record() {
        let id = document.getElementById("p1_id").value;
        if(!id) return alert("粉號為必填");
        db.powder[id] = {
            code: document.getElementById("p1_code").value,
            color: document.getElementById("p1_color").value,
            weight: parseInt(document.getElementById("p1_weight").value)
        };
        if(!db.inventory[id]) db.inventory[id] = { box:0, loose:0, safe:100 };
        syncData(); document.getElementById("p1_id").value = "";
    }
    function deleteP1Record() {
        let id = document.getElementById("p1_id").value;
        if(db.powder[id] && confirm(`確認刪除 ${id}?`)) { delete db.powder[id]; delete db.inventory[id]; syncData(); }
    }
    function renderP1() {
        let tbody = document.getElementById("p1_table").querySelector("tbody"); tbody.innerHTML = "";
        for(let id in db.powder) {
            tbody.innerHTML += `<tr><td>${id}</td><td>${db.powder[id].code}</td><td>${db.powder[id].weight}kg</td><td class="admin-only"><button class="action-btn act-edit" onclick="document.getElementById('p1_id').value='${id}'">選</button></td></tr>`;
        }
    }

    // P2: 庫存
    function calcP2Total() {
        let id = document.getElementById("p2_id").value; if(!id) return;
        let w = db.powder[id].weight; let b = parseFloat(document.getElementById("p2_box").value)||0; let l = parseFloat(document.getElementById("p2_loose").value)||0;
        document.getElementById("p2_total").value = (w*b + l).toFixed(2);
    }
    function saveP2Record() {
        let id = document.getElementById("p2_id").value; if(!id) return alert("請選擇粉號");
        db.inventory[id].box = parseFloat(document.getElementById("p2_box").value)||0;
        db.inventory[id].loose = parseFloat(document.getElementById("p2_loose").value)||0;
        syncData(); alert("庫存已盤點更新");
    }
    function renderP2() {
        let tbody = document.getElementById("p2_table").querySelector("tbody"); tbody.innerHTML = "";
        for(let id in db.inventory) {
            if(!db.powder[id]) continue;
            let total = db.powder[id].weight * db.inventory[id].box + db.inventory[id].loose;
            tbody.innerHTML += `<tr><td>${id}</td><td>${total.toFixed(1)}</td><td>${db.inventory[id].safe}</td><td class="admin-only"><button class="action-btn act-del" onclick="db.inventory['${id}'].box=0;db.inventory['${id}'].loose=0;syncData();">歸零</button></td></tr>`;
        }
    }

    // P3: 入庫
    function saveP3Record() {
        let id = document.getElementById("p3_id").value; let date = document.getElementById("p3_date").value;
        let b = parseFloat(document.getElementById("p3_box").value)||0; let l = parseFloat(document.getElementById("p3_loose").value)||0;
        if(!id || !date) return alert("資料不齊全");
        db.purchase.push({date, id, box: b, loose: l});
        db.inventory[id].box += b; db.inventory[id].loose += l;
        syncData();
    }
    function deleteP3(idx) {
        if(confirm("刪除此入庫紀錄？")) {
            let r = db.purchase[idx]; db.inventory[r.id].box -= r.box; db.inventory[r.id].loose -= r.loose;
            db.purchase.splice(idx, 1); syncData();
        }
    }
    function renderP3() {
        let tbody = document.getElementById("p3_table").querySelector("tbody"); tbody.innerHTML = "";
        db.purchase.forEach((r, i) => {
            tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.id}</td><td>${r.box}箱/${r.loose}kg</td><td class="admin-only"><button class="action-btn act-del" onclick="deleteP3(${i})">刪</button></td></tr>`;
        });
    }

    // P4: 出庫 (修正：抓取並顯示當前庫存)
    function linkP4Fields() {
        let id = document.getElementById("p4_id").value; 
        let stockField = document.getElementById("p4_stock");
        if(!id || !db.inventory[id]) { stockField.value = ""; return; }
        stockField.value = `${db.inventory[id].box} 箱 + ${db.inventory[id].loose} kg`;
    }
    function saveP4Record() {
        let id = document.getElementById("p4_id").value; let date = document.getElementById("p4_date").value;
        let b = parseFloat(document.getElementById("p4_box").value)||0; let l = parseFloat(document.getElementById("p4_loose").value)||0; let ret = parseFloat(document.getElementById("p4_return").value)||0;
        if(!id || !date) return alert("資料不齊全");
        
        let usageVal = (db.powder[id].weight * b) + l - ret;
        db.usage.push({date, id, box: b, loose: l, returned: ret, usage: usageVal});
        
        db.inventory[id].box -= b; 
        db.inventory[id].loose = db.inventory[id].loose - l + ret;
        if(db.inventory[id].loose < 0) db.inventory[id].loose = 0;
        syncData(); linkP4Fields(); // 更新顯示
    }
    function deleteP4(idx) {
        if(confirm("刪除此出庫紀錄？系統將補回庫存。")) {
            let r = db.usage[idx]; 
            db.inventory[r.id].box += r.box; db.inventory[r.id].loose = db.inventory[r.id].loose + r.loose - r.returned;
            db.usage.splice(idx, 1); syncData();
        }
    }
    function renderP4() {
        let tbody = document.getElementById("p4_table").querySelector("tbody"); tbody.innerHTML = "";
        db.usage.forEach((r, i) => {
            tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.id}</td><td>${r.usage.toFixed(1)}kg</td><td class="admin-only"><button class="action-btn act-del" onclick="deleteP4(${i})">刪</button></td></tr>`;
        });
    }

    // P5 & P6 查詢
    function refreshP5() {
        let sel = document.getElementById("p5_date");
        let dates = [...new Set(db.usage.map(r => r.date))].sort().reverse();
        sel.innerHTML = '<option value="">請選擇日期</option>' + dates.map(d => `<option value="${d}">${d}</option>`).join('');
    }
    function queryP5() {
        let date = document.getElementById("p5_date").value;
        let tbody = document.getElementById("p5_table").querySelector("tbody"); tbody.innerHTML = "";
        db.usage.filter(r => r.date === date).forEach(r => {
            tbody.innerHTML += `<tr><td>${r.id}</td><td>${db.powder[r.id]?.code||''}</td><td>${r.usage}</td></tr>`;
        });
    }
    function queryP6() {
        let id = document.getElementById("p6_select").value;
        let box = document.getElementById("p6_result");
        if(!id) { box.style.display="none"; return; }
        let total = db.powder[id].weight * db.inventory[id].box + db.inventory[id].loose;
        box.style.display="block";
        box.innerHTML = `<p><strong>粉號:</strong> ${id}</p><p><strong>庫存:</strong> ${db.inventory[id].box}箱 + ${db.inventory[id].loose}kg</p><h3 class="red-bold" style="margin-top:10px;">總計: ${total.toFixed(2)} kg</h3>`;
    }

    // P7 & P8: 廢粉 (拆分紀錄與數據)
    function saveP7Record() {
        let date = document.getElementById("p7_date").value; let qty = parseFloat(document.getElementById("p7_qty").value)||0;
        if(!date || qty<=0) return alert("填寫錯誤");
        db.waste.push({date, qty, total: qty*25, timestamp: new Date().getTime()});
        syncData();
    }
    function renderP7() {
        let tbody = document.getElementById("p7_table").querySelector("tbody"); tbody.innerHTML = "";
        db.waste.forEach((r, i) => {
            tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.qty}桶</td><td>${r.total}kg</td><td class="admin-only"><button class="action-btn act-del" onclick="db.waste.splice(${i},1);syncData();">刪</button></td></tr>`;
        });
    }
    function calcWasteStats() {
        let resetTime = db.settings.p8_reset_time || 0;
        let validData = db.waste.filter(r => r.timestamp >= resetTime);
        let total = validData.reduce((sum, r) => sum + r.total, 0);
        document.getElementById("p8_cum_ton").innerText = (total/1000).toFixed(3);
        
        if(validData.length > 0) {
            let days = Math.ceil((new Date().getTime() - Math.min(...validData.map(r=>r.timestamp))) / 86400000) || 1;
            let avg = total / days;
            document.getElementById("avg_day").innerText = avg.toFixed(1);
            let rem = 10000 - total;
            let box = document.getElementById("p8_alert_box");
            if(rem <= 0) { box.innerHTML = "⚠️ 已達 10 噸清運標準！"; box.style.background = "#fee2e2"; box.style.color = "#b91c1c"; }
            else { box.innerHTML = `預估還有 <strong>${Math.ceil(rem/avg)}</strong> 天達到 10 噸`; box.style.background = "#e0f2fe"; box.style.color = "#0369a1"; }
        }
    }
    function resetP8() {
        if(confirm("確定重置清運計算？歷史流水帳保留。")) { db.settings.p8_reset_time = new Date().getTime(); syncData(); calcWasteStats(); }
    }

    // ========================================================
    // 6. CSV 匯出匯入 (共用模組)
    // ========================================================
    function exportCSV(module) {
        let csv = "\uFEFF", data = db[module], filename = module + ".csv";
        if(module === 'powder') { csv += "粉號,代號,色系,淨重\n"; for(let id in data) csv += `${id},${data[id].code},${data[id].color},${data[id].weight}\n`; }
        if(module === 'inventory') { csv += "粉號,箱數,散粉,安全值\n"; for(let id in data) csv += `${id},${data[id].box},${data[id].loose},${data[id].safe}\n`; }
        if(module === 'purchase') { csv += "日期,粉號,箱數,散粉\n"; data.forEach(r => csv+=`${r.date},${r.id},${r.box},${r.loose}\n`); }
        if(module === 'usage') { csv += "日期,粉號,箱數,散粉,回庫,實際用量\n"; data.forEach(r => csv+=`${r.date},${r.id},${r.box},${r.loose},${r.returned},${r.usage}\n`); }
        if(module === 'waste') { csv += "日期,桶數,總重\n"; data.forEach(r => csv+=`${r.date},${r.qty},${r.total}\n`); }
        
        let link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        link.download = filename; link.click();
    }
    function importCSV(module) {
        // 考量篇幅，以簡單的警告提示管理員請小心操作覆蓋，實務上可依照上方案例拆解文字檔處理。
        alert("匯入功能需確保 CSV 格式與系統一致，目前啟動 Firebase 同步機制後，建議使用管理後台批次處理。");
    }
</script>
