<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>烤漆部粉體系統</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --main-color: #00f3ff;
            --danger-color: #ff3366;
            --text-color: #e0e0e0;
            --card-bg: rgba(0, 243, 255, 0.05);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
        }
        h1 {
            color: var(--main-color);
            text-shadow: 0 0 10px var(--main-color);
            font-size: 28px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--main-color);
            padding-bottom: 10px;
        }
        h2 { color: var(--main-color); font-size: 22px; }
        
        /* Menu Buttons */
        .menu-list { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .btn {
            background: transparent;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            padding: 15px;
            font-size: 26px; /* 指定字體大小26 */
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: inset 0 0 5px var(--main-color);
        }
        .btn:hover, .btn:active { background: var(--main-color); color: #000; box-shadow: 0 0 15px var(--main-color); }
        .btn-small { font-size: 16px; padding: 8px 15px; margin: 5px; }
        .btn-danger { color: var(--danger-color); border-color: var(--danger-color); box-shadow: inset 0 0 5px var(--danger-color); }
        .btn-danger:hover { background: var(--danger-color); color: white; box-shadow: 0 0 15px var(--danger-color); }

        /* Pages */
        .page { display: none; max-width: 500px; margin: 0 auto; text-align: left; }
        .page.active { display: block; }

        /* Form Elements */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--main-color); font-size: 18px; }
        input, select {
            width: 100%; padding: 10px; box-sizing: border-box;
            background: #111; color: #fff; border: 1px solid #333;
            border-radius: 4px; font-size: 18px;
        }
        input:focus, select:focus { border-color: var(--main-color); outline: none; }
        
        /* Table / List View */
        .record-card {
            background: var(--card-bg); border: 1px solid #333; border-radius: 8px;
            padding: 15px; margin-bottom: 10px; position: relative; font-size: 18px;
        }
        .red-bold { color: var(--danger-color); font-weight: bold; }
        .red-bg { background-color: var(--danger-color); color: white; padding: 2px 5px; border-radius: 4px; }

        /* Password Modal */
        #auth-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .auth-box { background: #111; padding: 30px; border: 2px solid var(--main-color); border-radius: 10px; text-align: center; }
        
        /* Circular Progress for Waste */
        .progress-ring {
            width: 150px; height: 150px; border-radius: 50%; margin: 20px auto;
            background: conic-gradient(var(--main-color) 0%, #333 0%);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .progress-ring::before {
            content: ""; position: absolute; inset: 15px; border-radius: 50%; background: var(--bg-color);
        }
        .progress-text { position: relative; z-index: 1; font-size: 20px; font-weight: bold; text-align: center; }

        /* Utility */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-10 { margin-top: 10px; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

    <h1 id="main-title">烤漆部粉體系統</h1>

    <div id="page-menu" class="page active">
        <div class="menu-list">
            <button class="btn" onclick="requireAuth(1)">1. 烤漆粉號清冊</button>
            <button class="btn" onclick="requireAuth(2)">2. 庫存監控</button>
            <button class="btn" onclick="requireAuth(3)">3. 採購入庫</button>
            <button class="btn" onclick="requireAuth(4)">4. 用量紀錄</button>
            <button class="btn" onclick="navTo(5)">5. 用量紀錄查詢</button>
            <button class="btn" onclick="navTo(6)">6. 庫存查詢</button>
            <button class="btn" onclick="requireAuth(7, true)">7. 廢粉統計</button>
            <button class="btn btn-danger" onclick="requireAuth(8)">8. 清除數據</button>
        </div>
    </div>

    <div id="auth-modal">
        <div class="auth-box">
            <h2>系統權限驗證</h2>
            <input type="password" id="pwd-input" placeholder="輸入密碼" style="text-align:center; font-size:24px;">
            <div class="mt-10">
                <button class="btn btn-small" onclick="checkPwd()">確認</button>
                <button class="btn btn-small btn-danger" onclick="closeAuth()">取消</button>
                <button class="btn btn-small" id="skip-pwd-btn" style="display:none;" onclick="skipPwd()">忽略密碼 (僅檢視)</button>
            </div>
        </div>
    </div>

    <div id="page-1" class="page">
        <div class="flex-between">
            <h2>1. 烤漆粉號清冊</h2>
            <button class="btn btn-small btn-danger" onclick="navTo('menu')">返回首頁</button>
        </div>
        <div class="form-group"><label>粉號</label><input type="text" id="p1-no"></div>
        <div class="form-group"><label>代號</label><input type="text" id="p1-code"></div>
        <div class="form-group"><label>色系</label><input type="text" id="p1-color"></div>
        <div class="form-group">
            <label>淨重</label>
            <select id="p1-weight"><option value="20">20</option><option value="25">25</option></select>
        </div>
        <div class="form-group">
            <label>廠商</label>
            <select id="p1-vendor">
                <option value="老虎">老虎</option><option value="國麗">國麗</option><option value="國邦">國邦</option>
                <option value="台粉">台粉</option><option value="長誠">長誠</option><option value="高頻">高頻</option><option value="南寶">南寶</option>
            </select>
        </div>
        <button class="btn" style="width:100%" onclick="addPowder()">新增紀錄</button>
        <hr style="border-color:#333; margin:20px 0;">
        <div class="flex-between">
            <input type="file" id="p1-csv-import" accept=".csv" style="width:50%; font-size:12px;">
            <button class="btn btn-small" onclick="importCSV('powder')">匯入 CSV</button>
            <button class="btn btn-small" onclick="exportCSV('powder')">匯出 CSV</button>
        </div>
        <div class="mt-10">
            <button class="btn btn-small" onclick="toggleHideDown()">切換顯示/隱藏已下架</button>
        </div>
        <div id="p1-list" class="mt-10"></div>
    </div>

    <div id="page-2" class="page">
        <div class="flex-between">
            <h2>2. 庫存監控</h2>
            <button class="btn btn-small btn-danger" onclick="navTo('menu')">返回</button>
        </div>
        <div class="form-group">
            <label>粉號查詢/更新 (選擇連動)</label>
            <select id="p2-select" onchange="loadInvDetail()"></select>
        </div>
        <div class="form-group"><label>代號：<span id="p2-code"></span></label></div>
        <div class="form-group"><label>淨重：<span id="p2-weight">0</span></label></div>
        <div class="form-group"><label>散粉 (手動更新)</label><input type="number" id="p2-loose" value="0"></div>
        <div class="form-group"><label>箱數 (手動更新)</label><input type="number" id="p2-box" value="0"></div>
        <div class="form-group"><label>安全庫存量設定</label><input type="number" id="p2-safe" value="50"></div>
        <button class="btn" style="width:100%" onclick="updateInventory()">盤點寫入 / 更新</button>
        
        <hr style="border-color:#333; margin:20px 0;">
        <div class="flex-between">
            <input type="file" id="p2-csv-import" accept=".csv" style="width:50%; font-size:12px;">
            <button class="btn btn-small" onclick="exportCSV('inventory')">匯出 CSV</button>
        </div>
        <div id="p2-list" class="mt-10"></div>
    </div>

    <div id="page-3" class="page">
        <div class="flex-between">
            <h2>3. 採購入庫</h2>
            <button class="btn btn-small btn-danger" onclick="navTo('menu')">返回</button>
        </div>
        <div class="form-group"><label>日期</label><input type="date" id="p3-date"></div>
        <div class="form-group"><label>粉號</label><select id="p3-select" onchange="autoFillP3()"></select></div>
        <p>代號: <span id="p3-code">-</span> | 色系: <span id="p3-color">-</span> | 淨重: <span id="p3-weight">0</span></p>
        <div class="form-group"><label>入庫箱數</label><input type="number" id="p3-box" value="0"></div>
        <div class="form-group"><label>入庫散粉</label><input type="number" id="p3-loose" value="0"></div>
        <button class="btn" style="width:100%" onclick="addInbound()">寫入並更新庫存</button>
        <hr style="border-color:#333;">
        <button class="btn btn-small" onclick="exportCSV('inbound')">匯出紀錄流水帳</button>
        <div id="p3-list" class="mt-10"></div>
    </div>

    <div id="page-4" class="page">
        <div class="flex-between">
            <h2>4. 用量紀錄</h2>
            <button class="btn btn-small btn-danger" onclick="navTo('menu')">返回</button>
        </div>
        <div class="form-group"><label>日期</label><input type="date" id="p4-date"></div>
        <div class="form-group"><label>粉號</label><select id="p4-select" onchange="autoFillP4()"></select></div>
        <p>代號: <span id="p4-code">-</span> | 庫存總量: <span id="p4-inv">-</span></p>
        <p>淨重: <span id="p4-weight">0</span></p>
        <div class="form-group"><label>扣除箱數</label><input type="number" id="p4-box" value="0"></div>
        <div class="form-group"><label>扣除散粉</label><input type="number" id="p4-loose" value="0"></div>
        <div class="form-group"><label>回庫散粉</label><input type="number" id="p4-return" value="0"></div>
        <button class="btn" style="width:100%" onclick="addUsage()">計算用量並扣除庫存</button>
        <hr style="border-color:#333;">
        <button class="btn btn-small" onclick="exportCSV('usage')">匯出紀錄流水帳</button>
        <div id="p4-list" class="mt-10"></div>
    </div>

    <div id="page-5" class="page">
        <div class="flex-between">
            <h2>5. 用量紀錄查詢</h2>
            <button class="btn btn-small btn-danger" onclick="navTo('menu')">返回</button>
        </div>
        <div class="form-group">
            <label>選擇日期查詢</label>
            <select id="p5-date-select" onchange="renderUsageQuery()"></select>
        </div>
        <div id="p5-list" class="mt-10"></div>
    </div>

    <div id="page-6" class="page">
        <div class="flex-between">
            <h2>6. 庫存查詢</h2>
            <button class="btn btn-small btn-danger" onclick="navTo('menu')">返回</button>
        </div>
        <div class="form-group">
            <label>選擇粉號 / 代號</label>
            <select id="p6-select" onchange="renderInvQuery()"></select>
        </div>
        <div id="p6-result" class="record-card mt-10 text-center" style="font-size:18px;">
            請選擇粉號以顯示結果
        </div>
    </div>

    <div id="page-7" class="page">
        <div class="flex-between">
            <h2>7. 廢粉統計</h2>
            <button class="btn btn-small btn-danger" onclick="navTo('menu')">返回</button>
        </div>
        
        <div id="p7-input-area">
            <div class="form-group"><label>日期</label><input type="date" id="p7-date"></div>
            <div class="form-group"><label>數量 (箱/包)</label><input type="number" id="p7-qty" value="1"></div>
            <div class="form-group"><label>淨重固定</label><input type="number" value="25" disabled></div>
            <button class="btn" style="width:100%" onclick="addWaste()">寫入廢粉紀錄</button>
        </div>

        <div class="progress-ring" id="waste-ring">
            <div class="progress-text">
                <span id="waste-tons">0</span> 噸<br>
                <span id="waste-percent" style="font-size:14px; color:#888;">0%</span>
            </div>
        </div>
        <p class="text-center" id="waste-estimate">預估到達 10 噸：計算中...</p>

        <div class="record-card text-center">
            <p>日平均: <span id="avg-day">0</span> kg</p>
            <p>周平均: <span id="avg-week">0</span> kg</p>
            <p>月平均: <span id="avg-month">0</span> kg</p>
            <p>年平均: <span id="avg-year">0</span> kg</p>
        </div>
        
        <button class="btn btn-danger" style="width:100%" onclick="resetWaste()" id="p7-reset-btn">重置廢粉指數 (歸零)</button>
        <div id="p7-list" class="mt-10"></div>
    </div>

<script>
    // ---------------- 資料庫初始化 (LocalStorage) ----------------
    const PWD = "M0282";
    let isReadonly = false;
    let targetPageQueue = null;
    let hideDown = false; // 隱藏已下架

    // 取得當天日期
    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // 資料結構初始化
    function initData() {
        if(!localStorage.getItem('powders')) localStorage.setItem('powders', JSON.stringify([]));
        if(!localStorage.getItem('inventory')) localStorage.setItem('inventory', JSON.stringify([]));
        if(!localStorage.getItem('inbound')) localStorage.setItem('inbound', JSON.stringify([]));
        if(!localStorage.getItem('usage')) localStorage.setItem('usage', JSON.stringify([]));
        if(!localStorage.getItem('waste')) localStorage.setItem('waste', JSON.stringify([]));
        
        document.getElementById('p3-date').value = getToday();
        document.getElementById('p4-date').value = getToday();
        document.getElementById('p7-date').value = getToday();
    }
    
    function getData(key) { return JSON.parse(localStorage.getItem(key)) || []; }
    function setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    // ---------------- UI 導航與權限 ----------------
    function navTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId === 'menu' ? 'page-menu' : 'page-' + pageId).classList.add('active');
        refreshPageData(pageId);
    }

    function requireAuth(pageId, canSkip = false) {
        isReadonly = false;
        targetPageQueue = pageId;
        document.getElementById('pwd-input').value = "";
        document.getElementById('auth-modal').style.display = 'flex';
        document.getElementById('skip-pwd-btn').style.display = canSkip ? 'inline-block' : 'none';
        document.getElementById('pwd-input').focus();
    }

    function checkPwd() {
        const input = document.getElementById('pwd-input').value;
        if(input === PWD) {
            closeAuth();
            if(targetPageQueue === 8) { clearAllData(); return; }
            navTo(targetPageQueue);
        } else {
            alert("密碼錯誤，請重新輸入");
            document.getElementById('pwd-input').value = "";
        }
    }

    function skipPwd() {
        isReadonly = true;
        closeAuth();
        navTo(targetPageQueue);
    }

    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

    // 每次進入頁面更新下拉選單與資料
    function refreshPageData(pageId) {
        if(pageId == 1) renderPowder();
        if(pageId == 2) { loadPowderSelects('p2-select'); renderInventory(); }
        if(pageId == 3) { loadPowderSelects('p3-select'); autoFillP3(); renderInbound(); }
        if(pageId == 4) { loadPowderSelects('p4-select'); autoFillP4(); renderUsage(); }
        if(pageId == 5) { loadDateSelects(); renderUsageQuery(); }
        if(pageId == 6) { loadPowderSelects('p6-select'); renderInvQuery(); }
        if(pageId == 7) { 
            document.getElementById('p7-input-area').style.display = isReadonly ? 'none' : 'block';
            document.getElementById('p7-reset-btn').style.display = isReadonly ? 'none' : 'block';
            renderWaste(); 
        }
    }

    // ---------------- 通用功能 ----------------
    function loadPowderSelects(selectId) {
        const powders = getData('powders');
        const sel = document.getElementById(selectId);
        sel.innerHTML = powders.filter(p => !p.down).map(p => `<option value="${p.no}">${p.no} - ${p.code}</option>`).join('');
    }

    function loadDateSelects() {
        const usages = getData('usage');
        const dates = [...new Set(usages.map(u => u.date))].sort().reverse();
        const sel = document.getElementById('p5-date-select');
        sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function deleteRecord(key, index) {
        if(!confirm('確定刪除此紀錄？')) return;
        let data = getData(key);
        data.splice(index, 1);
        setData(key, data);
        if(key === 'powders') renderPowder();
        if(key === 'inbound') renderInbound();
        if(key === 'usage') renderUsage();
        if(key === 'waste') renderWaste();
    }

    // ---------------- 1. 烤漆粉號清冊 ----------------
    function addPowder() {
        const no = document.getElementById('p1-no').value;
        const code = document.getElementById('p1-code').value;
        if(!no || !code) return alert('粉號與代號為必填');
        let powders = getData('powders');
        let inv = getData('inventory');
        
        powders.push({
            no: no, code: code,
            color: document.getElementById('p1-color').value,
            weight: Number(document.getElementById('p1-weight').value),
            vendor: document.getElementById('p1-vendor').value,
            down: false
        });
        
        // 自動建立庫存檔
        if(!inv.find(i => i.no === no)) {
            inv.push({ no: no, loose: 0, box: 0, safe: 50 });
            setData('inventory', inv);
        }

        setData('powders', powders);
        renderPowder();
        document.getElementById('p1-no').value = ''; document.getElementById('p1-code').value = '';
    }

    function toggleHideDown() { hideDown = !hideDown; renderPowder(); }
    
    function toggleDownStatus(index) {
        let powders = getData('powders');
        powders[index].down = !powders[index].down;
        setData('powders', powders);
        renderPowder();
    }

    function renderPowder() {
        let powders = getData('powders');
        let html = '';
        powders.forEach((p, i) => {
            if(hideDown && p.down) return;
            html += `
            <div class="record-card ${p.down ? 'red-bold':''}">
                <div class="flex-between">
                    <b>${p.no} (${p.code})</b>
                    <div>
                        <button class="btn btn-small" onclick="toggleDownStatus(${i})">${p.down ? '上架':'下架'}</button>
                        <button class="btn btn-small btn-danger" onclick="deleteRecord('powders', ${i})">刪</button>
                    </div>
                </div>
                色系:${p.color} | 淨重:${p.weight}kg | 廠商:${p.vendor}
            </div>`;
        });
        document.getElementById('p1-list').innerHTML = html;
    }

    // ---------------- 2. 庫存監控 ----------------
    function loadInvDetail() {
        const no = document.getElementById('p2-select').value;
        const powders = getData('powders');
        const inv = getData('inventory');
        const p = powders.find(x => x.no === no);
        const iv = inv.find(x => x.no === no) || {loose:0, box:0, safe:50};

        if(p) {
            document.getElementById('p2-code').innerText = p.code;
            document.getElementById('p2-weight').innerText = p.weight;
            document.getElementById('p2-loose').value = iv.loose;
            document.getElementById('p2-box').value = iv.box;
            document.getElementById('p2-safe').value = iv.safe;
        }
    }

    function updateInventory() {
        const no = document.getElementById('p2-select').value;
        if(!no) return;
        let inv = getData('inventory');
        let idx = inv.findIndex(x => x.no === no);
        const newData = {
            no: no,
            loose: Number(document.getElementById('p2-loose').value),
            box: Number(document.getElementById('p2-box').value),
            safe: Number(document.getElementById('p2-safe').value)
        };
        if(idx >= 0) inv[idx] = newData; else inv.push(newData);
        setData('inventory', inv);
        alert('庫存已盤點寫入');
        renderInventory();
    }

    function renderInventory() {
        const powders = getData('powders');
        const inv = getData('inventory');
        let html = '';
        powders.forEach(p => {
            if(p.down) return;
            const iv = inv.find(x => x.no === p.no) || {loose:0, box:0, safe:50};
            const totalQty = (iv.box * p.weight) + iv.loose;
            const isLow = totalQty < iv.safe;
            html += `
            <div class="record-card ${isLow ? 'red-bg' : ''}">
                <b>${p.no} (${p.code})</b><br>
                箱數: ${iv.box} | 散粉: ${iv.loose}kg | 淨重: ${p.weight}kg<br>
                總數量: <b>${totalQty} kg</b> (安全值:${iv.safe})
            </div>`;
        });
        document.getElementById('p2-list').innerHTML = html;
    }

    // ---------------- 3. 採購入庫 ----------------
    function autoFillP3() {
        const no = document.getElementById('p3-select').value;
        const p = getData('powders').find(x => x.no === no);
        if(p) {
            document.getElementById('p3-code').innerText = p.code;
            document.getElementById('p3-color').innerText = p.color;
            document.getElementById('p3-weight').innerText = p.weight;
        }
    }

    function addInbound() {
        const no = document.getElementById('p3-select').value;
        const box = Number(document.getElementById('p3-box').value);
        const loose = Number(document.getElementById('p3-loose').value);
        if(!no) return;

        let inbound = getData('inbound');
        let inv = getData('inventory');
        const p = getData('powders').find(x => x.no === no);
        const total = (box * p.weight) + loose;

        // 寫入流水帳
        inbound.push({
            date: document.getElementById('p3-date').value,
            no: no, code: p.code, color: p.color, weight: p.weight,
            box: box, loose: loose, total: total
        });
        setData('inbound', inbound);

        // 更新庫存 (自動加回)
        let idx = inv.findIndex(x => x.no === no);
        if(idx >= 0) {
            inv[idx].box += box;
            inv[idx].loose += loose;
        } else {
            inv.push({ no: no, loose: loose, box: box, safe: 50 });
        }
        setData('inventory', inv);

        document.getElementById('p3-box').value = 0; document.getElementById('p3-loose').value = 0;
        renderInbound(); alert('入庫成功，庫存已更新');
    }

    function renderInbound() {
        let inbound = getData('inbound').slice(-20).reverse(); // 只顯示最近20筆
        let html = inbound.map((d, i) => `
            <div class="record-card flex-between">
                <div>[${d.date}] ${d.no}<br>入庫: ${d.box}箱 ${d.loose}kg (總 ${d.total}kg)</div>
            </div>`).join('');
        document.getElementById('p3-list').innerHTML = html;
    }

    // ---------------- 4. 用量紀錄 ----------------
    function autoFillP4() {
        const no = document.getElementById('p4-select').value;
        const p = getData('powders').find(x => x.no === no);
        const iv = getData('inventory').find(x => x.no === no) || {loose:0, box:0};
        if(p) {
            document.getElementById('p4-code').innerText = p.code;
            document.getElementById('p4-weight').innerText = p.weight;
            document.getElementById('p4-inv').innerText = `${iv.box}箱 ${iv.loose}kg (共 ${(iv.box*p.weight)+iv.loose}kg)`;
        }
    }

    function addUsage() {
        const no = document.getElementById('p4-select').value;
        const box = Number(document.getElementById('p4-box').value);
        const loose = Number(document.getElementById('p4-loose').value);
        const ret = Number(document.getElementById('p4-return').value);
        if(!no) return;

        let usage = getData('usage');
        let inv = getData('inventory');
        const p = getData('powders').find(x => x.no === no);
        
        const weight = (box * p.weight) + loose;
        const realUsage = weight - ret;

        usage.push({
            date: document.getElementById('p4-date').value,
            no: no, code: p.code, color: p.color, weight: p.weight,
            box: box, loose: loose, extractWeight: weight, return: ret, usage: realUsage
        });
        setData('usage', usage);

        // 更新庫存 (扣除並加回散粉)
        let idx = inv.findIndex(x => x.no === no);
        if(idx >= 0) {
            inv[idx].box -= box;
            inv[idx].loose = inv[idx].loose - loose + ret;
        }
        setData('inventory', inv);

        document.getElementById('p4-box').value=0; document.getElementById('p4-loose').value=0; document.getElementById('p4-return').value=0;
        renderUsage(); autoFillP4(); alert('用量已記錄，庫存已扣除');
    }

    function renderUsage() {
        let usage = getData('usage').slice(-20).reverse();
        let html = usage.map(d => `
            <div class="record-card">
                <div>[${d.date}] ${d.no} (${d.code})</div>
                <div style="font-size:14px;">扣除:${d.box}箱 ${d.loose}kg | 總重:${d.extractWeight}kg | 回庫:${d.return}kg</div>
                <div class="red-bold text-center mt-10">實際用量: ${d.usage} kg</div>
            </div>`).join('');
        document.getElementById('p4-list').innerHTML = html;
    }

    // ---------------- 5. 用量紀錄查詢 ----------------
    function renderUsageQuery() {
        const date = document.getElementById('p5-date-select').value;
        if(!date) return;
        const usage = getData('usage').filter(u => u.date === date);
        let html = usage.map(d => `
            <div class="record-card">
                <b>${d.no} (${d.code})</b> - 色系:${d.color}<br>
                取出:${d.extractWeight}kg | 回庫:${d.return}kg<br>
                <div class="red-bold">當日用量: ${d.usage} kg</div>
            </div>`).join('');
        document.getElementById('p5-list').innerHTML = html || '無紀錄';
    }

    // ---------------- 6. 庫存查詢 ----------------
    function renderInvQuery() {
        const no = document.getElementById('p6-select').value;
        const p = getData('powders').find(x => x.no === no);
        const iv = getData('inventory').find(x => x.no === no);
        if(p && iv) {
            const total = (iv.box * p.weight) + iv.loose;
            document.getElementById('p6-result').innerHTML = `
                <h2>${p.no}</h2>
                <p>代號: ${p.code} | 色系: ${p.color}</p>
                <p>箱數: ${iv.box} | 散粉: ${iv.loose}kg</p>
                <p class="red-bold" style="font-size:24px;">庫存總重: ${total} kg</p>
            `;
        }
    }

    // ---------------- 7. 廢粉統計 ----------------
    function addWaste() {
        const date = document.getElementById('p7-date').value;
        const qty = Number(document.getElementById('p7-qty').value);
        let waste = getData('waste');
        waste.push({ date: date, qty: qty, total: qty * 25 });
        setData('waste', waste);
        renderWaste();
    }

    function renderWaste() {
        let waste = getData('waste');
        let totalSum = waste.reduce((sum, w) => sum + w.total, 0);
        let tons = (totalSum / 1000).toFixed(2);
        let percent = Math.min((totalSum / 10000) * 100, 100).toFixed(1);

        // 圓形進度條實體化 (10噸 = 10,000kg)
        const ring = document.getElementById('waste-ring');
        ring.style.background = `conic-gradient(var(--danger-color) ${percent}%, #333 ${percent}%)`;
        document.getElementById('waste-tons').innerText = tons;
        document.getElementById('waste-percent').innerText = percent + '%';
        
        if (totalSum >= 10000) {
            document.getElementById('waste-percent').classList.add('red-bold');
        } else {
            document.getElementById('waste-percent').classList.remove('red-bold');
        }

        // 計算平均
        if(waste.length > 0) {
            const firstDate = new Date(waste[0].date);
            const lastDate = new Date(); // 計算到今天
            let diffTime = Math.abs(lastDate - firstDate);
            let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1;
            
            let avgDay = totalSum / diffDays;
            document.getElementById('avg-day').innerText = avgDay.toFixed(2);
            document.getElementById('avg-week').innerText = (avgDay * 7).toFixed(2);
            document.getElementById('avg-month').innerText = (avgDay * 30).toFixed(2);
            document.getElementById('avg-year').innerText = (avgDay * 365).toFixed(2);

            // 預估天數
            if(avgDay > 0) {
                let remain = 10000 - totalSum;
                let daysLeft = Math.ceil(remain / avgDay);
                let estEl = document.getElementById('waste-estimate');
                if(daysLeft <= 0) {
                    estEl.innerHTML = `<span class="red-bold" style="font-size:20px;">已超過 10 噸上限！</span>`;
                } else {
                    estEl.innerHTML = `以日平均預估，倒數 <span class="${daysLeft<10?'red-bold':''}">${daysLeft}</span> 天達到 10 噸`;
                }
            }
        }

        let html = waste.slice(-10).reverse().map((w, i) => `
            <div class="record-card flex-between">
                <span>[${w.date}] ${w.qty}包</span>
                <span>總重:${w.total}kg</span>
            </div>`).join('');
        document.getElementById('p7-list').innerHTML = html;
    }

    function resetWaste() {
        if(confirm('確定要將廢粉回收指數歸零？這將清除廢粉紀錄。')) {
            setData('waste', []); renderWaste();
        }
    }

    // ---------------- 8. 清除/CSV 模組 ----------------
    function clearAllData() {
        if(confirm('極度危險：確定清除所有系統資料嗎？')) {
            localStorage.clear(); initData(); alert('資料已全部清除'); navTo('menu');
        }
    }

    // 簡易 CSV 匯出
    function exportCSV(key) {
        const data = getData(key);
        if(data.length === 0) return alert('沒有資料可匯出');
        const headers = Object.keys(data[0]).join(',');
        const rows = data.map(obj => Object.values(obj).join(',')).join('\n');
        const csvContent = headers + '\n' + rows;
        
        const blob = new Blob(["\uFEFF"+csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `${key}_export_${getToday()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 簡易 CSV 匯入 (僅做粉號範例，實務需更嚴謹的解析)
    function importCSV(key) {
        const fileInput = document.getElementById(key === 'powder' ? 'p1-csv-import' : 'p2-csv-import');
        if(!fileInput.files.length) return alert('請先選擇檔案');
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split('\n');
            let data = getData(key);
            // 忽略第一行 header，簡單逗號分割
            for(let i=1; i<lines.length; i++) {
                if(!lines[i].trim()) continue;
                const cols = lines[i].split(',');
                if(key === 'powder' && cols.length >= 5) {
                    data.push({ no:cols[0], code:cols[1], color:cols[2], weight:Number(cols[3]), vendor:cols[4], down:false });
                }
            }
            setData(key, data);
            alert('匯入成功');
            if(key === 'powder') renderPowder();
        };
        reader.readAsText(fileInput.files[0]);
    }

    // 初始化
    window.onload = initData;

</script>
