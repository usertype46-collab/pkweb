<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業粉體烤漆庫存管理系統 (Cloud Version)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- 色彩美學與 UI 變數 (粉體烤漆質感) --- */
        :root {
            --primary: #2B2D42; /* 深邃夜空黑 (骨架) */
            --accent: #FF0054;  /* 高亮螢光桃紅 (烤漆亮點) */
            --bg-light: #EDF2F4; /* 珍珠霧白 (背景) */
            --card-bg: rgba(255, 255, 255, 0.85); /* 玻璃透視感 */
            --text-main: #3F4756;
            --success: #06D6A0;
            --warning: #FFD166;
            --danger: #EF476F;
            --blue-powder: #118AB2;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #DFE9F3 0%, #ffffff 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* --- 側邊導覽列 --- */
        .sidebar {
            width: 250px;
            background: var(--primary);
            color: white;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 900; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); letter-spacing: 1px; color: var(--bg-light); }
        .logo i { color: var(--accent); margin-right: 10px; }
        
        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            border-left: 4px solid transparent;
        }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.05); border-left: 4px solid var(--accent); color: white; }
        .menu-item i { width: 25px; font-size: 18px; color: var(--blue-powder); }
        .menu-item.active i { color: var(--accent); }

        /* --- 主內容區 --- */
        .main-content {
            margin-left: 250px;
            flex-grow: 1;
            padding: 30px;
            background: transparent;
        }

        /* --- 頂部狀態與登入列 --- */
        .top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; gap: 15px; }
        .auth-status { font-weight: bold; padding: 8px 15px; border-radius: 20px; font-size: 14px; }
        .status-viewer { background: #e2e8f0; color: #475569; }
        .status-admin { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        
        /* --- 卡片設計 --- */
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.4);
            margin-bottom: 20px;
        }
        h2 { color: var(--primary); margin-bottom: 20px; font-size: 22px; display: flex; align-items: center; gap: 10px;}
        
        /* --- 表單 --- */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #64748b; }
        input, select { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: var(--transition); background: #f8fafc; }
        input:focus, select:focus { border-color: var(--blue-powder); outline: none; box-shadow: 0 0 0 3px rgba(17, 138, 178, 0.1); background: white; }
        input[readonly] { background: #e2e8f0; color: #64748b; cursor: not-allowed; }

        /* --- 按鈕 --- */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--blue-powder); color: white; }
        .btn-primary:hover { background: #0c6888; box-shadow: 0 4px 12px rgba(17, 138, 178, 0.3); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        /* 權限控制 Class：只讓管理員看到 */
        .admin-only { display: none; } 

        /* --- 廢粉圓形百分比 --- */
        .waste-dashboard { display: flex; gap: 30px; align-items: center; }
        .circular-chart {
            width: 150px; height: 150px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            /* 預設 0%，透過 JS 修改背景 */
            background: conic-gradient(var(--danger) 0%, #e2e8f0 0%);
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .circular-chart::before {
            content: ""; position: absolute; width: 120px; height: 120px;
            background: white; border-radius: 50%;
        }
        .circular-value { position: relative; font-size: 24px; font-weight: 800; color: var(--primary); text-align: center; line-height: 1.2; }
        .circular-value span { font-size: 12px; color: #64748b; display: block; font-weight: normal;}

        /* --- 登入彈窗 (Modal) --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1000; display: none; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; }
        .login-box h3 { margin-bottom: 20px; color: var(--primary); }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><i class="fa-solid fa-spray-can-sparkles"></i> 色彩塗裝管理</div>
    <div class="menu-item active" onclick="switchPage('page-dashboard')"><i class="fa-solid fa-chart-pie"></i> 總覽與廢粉查詢</div>
    <div class="menu-item" onclick="switchPage('page-powder')"><i class="fa-solid fa-fill-drip"></i> 1. 烤漆粉號清冊</div>
    <div class="menu-item" onclick="switchPage('page-inventory')"><i class="fa-solid fa-boxes-stacked"></i> 2. 庫存監控盤點</div>
    <div class="menu-item" onclick="switchPage('page-inbound')"><i class="fa-solid fa-truck-ramp-box"></i> 3. 入庫流水帳</div>
    <div class="menu-item" onclick="switchPage('page-outbound')"><i class="fa-solid fa-dolly"></i> 4. 出庫用量紀錄</div>
    <div class="menu-item" onclick="switchPage('page-waste-record')"><i class="fa-solid fa-recycle"></i> 5. 廢粉回收紀錄</div>
</nav>

<main class="main-content">
    <div class="top-bar">
        <span id="authStatus" class="auth-status status-viewer"><i class="fa-solid fa-eye"></i> 訪客唯讀模式</span>
        <button id="loginBtn" class="btn btn-primary" onclick="showLogin()"><i class="fa-solid fa-lock"></i> 管理員登入</button>
        <button id="logoutBtn" class="btn btn-danger" onclick="logout()" style="display:none;"><i class="fa-solid fa-arrow-right-from-bracket"></i> 登出</button>
    </div>

    <div id="page-outbound" class="page">
        <div class="card">
            <h2><i class="fa-solid fa-dolly"></i> 出庫用量紀錄</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>選擇粉號</label>
                    <select id="out_powder_id" onchange="fetchCurrentInventory()">
                        <option value="">請選擇...</option>
                        </select>
                </div>
                <div class="form-group">
                    <label>當前庫存狀態 (系統抓取)</label>
                    <input type="text" id="out_current_stock" readonly placeholder="選擇粉號以抓取...">
                </div>
                <div class="form-group">
                    <label>扣除箱數</label>
                    <input type="number" id="out_box" value="0">
                </div>
                <div class="form-group">
                    <label>扣除散粉 (kg)</label>
                    <input type="number" id="out_loose" value="0">
                </div>
            </div>
            <div class="admin-only" style="margin-top: 20px;">
                <button class="btn btn-success" onclick="saveOutbound()"><i class="fa-solid fa-check"></i> 確認出庫扣帳</button>
            </div>
            <hr style="margin: 20px 0; border: 0.5px solid #e2e8f0;">
            <div class="admin-only">
                <h4>CSV 批次處理</h4>
                <input type="file" id="csv_outbound" accept=".csv" style="margin-top: 10px;">
                <button class="btn btn-primary" onclick="importCSV('csv_outbound', 'outbound')"><i class="fa-solid fa-upload"></i> 匯入 CSV</button>
            </div>
        </div>
    </div>

    <div id="page-dashboard" class="page active">
        <div class="card">
            <h2><i class="fa-solid fa-chart-pie"></i> 廢粉回收動態預測 (10噸警示)</h2>
            <div class="waste-dashboard">
                <div class="circular-chart" id="wasteChart">
                    <div class="circular-value"><span id="wasteTon">0</span><span>/ 10 噸</span></div>
                </div>
                <div>
                    <h3 style="color: var(--danger); margin-bottom: 10px;" id="wasteAlertText">目前狀態良好</h3>
                    <p style="color: #64748b; margin-bottom: 5px;">本期累積總重：<strong id="wasteTotalKg" style="color:var(--primary);">0 kg</strong></p>
                    <p style="color: #64748b;">日平均產出量：<strong id="wasteAvgDay">0 kg/天</strong></p>
                </div>
            </div>
        </div>
    </div>
    
    </main>

<div class="modal-overlay" id="loginModal">
    <div class="login-box">
        <h3>管理員身分驗證</h3>
        <input type="email" id="loginEmail" placeholder="信箱" style="width: 100%; margin-bottom: 15px;">
        <input type="password" id="loginPwd" placeholder="密碼" style="width: 100%; margin-bottom: 20px;">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn btn-primary" onclick="executeLogin()">登入</button>
            <button class="btn" style="background:#e2e8f0;" onclick="document.getElementById('loginModal').style.display='none'">取消</button>
        </div>
        <p id="loginError" style="color: red; font-size: 12px; margin-top: 10px; display: none;">帳號或密碼錯誤</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔴 步驟：請在此處貼上您的 Firebase Config！
    const firebaseConfig = {
        apiKey: "AIzaSyDTIMGBYqAqOpFcCqEMjWWUwC_nPAfQ9ko",
        authDomain: "paint-system-21867.firebaseapp.com",
        projectId: "https://paint-system-21867-default-rtdb.firebaseio.com",
        storageBucket: "paint-system-21867.appspot.com",
        messagingSenderId: "855614444799",
        appId: "1:855614444799:web:db649669302532ea4aa8ca"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- 全局狀態 ---
    window.isAdmin = false;

    // --- 介面切換 ---
    window.switchPage = function(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    // --- 身分驗證邏輯 (取代 Prompt) ---
    onAuthStateChanged(auth, (user) => {
        const authStatus = document.getElementById('authStatus');
        const adminEls = document.querySelectorAll('.admin-only');
        
        if (user) {
            window.isAdmin = true;
            authStatus.className = 'auth-status status-admin';
            authStatus.innerHTML = '<i class="fa-solid fa-user-shield"></i> 管理員模式 (具寫入權限)';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-flex';
            adminEls.forEach(el => el.style.display = 'block'); // 顯示管理按鈕
        } else {
            window.isAdmin = false;
            authStatus.className = 'auth-status status-viewer';
            authStatus.innerHTML = '<i class="fa-solid fa-eye"></i> 訪客唯讀模式';
            document.getElementById('loginBtn').style.display = 'inline-flex';
            document.getElementById('logoutBtn').style.display = 'none';
            adminEls.forEach(el => el.style.display = 'none'); // 隱藏管理按鈕
        }
    });

    window.showLogin = () => document.getElementById('loginModal').style.display = 'flex';
    window.executeLogin = () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPwd').value;
        signInWithEmailAndPassword(auth, email, pwd)
            .then(() => { document.getElementById('loginModal').style.display = 'none'; })
            .catch(err => { document.getElementById('loginError').style.display = 'block'; });
    };
    window.logout = () => signOut(auth);

    // --- 出庫系統：自動連動抓取庫存 ---
    window.fetchCurrentInventory = async function() {
        const powderId = document.getElementById('out_powder_id').value;
        if(!powderId) {
            document.getElementById('out_current_stock').value = "";
            return;
        }
        
        // 抓取 Firebase 庫存資料
        try {
            const docRef = doc(db, "inventory", powderId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('out_current_stock').value = `${data.box} 箱 + 散粉 ${data.loose} kg`;
            } else {
                document.getElementById('out_current_stock').value = "尚未建立庫存資料";
            }
        } catch (e) {
            console.error("讀取失敗:", e);
        }
    };

    // --- CSV 批次匯入優化 (解決系統警告與卡死) ---
    // 利用 Firestore 的 Batch Write (批次寫入) 與非同步處理
    window.importCSV = function(inputId, targetCollection) {
        if(!window.isAdmin) return alert("權限不足！");
        
        const fileInput = document.getElementById(inputId);
        if (!fileInput.files.length) return alert("請選取 CSV 檔案！");
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            let lines = e.target.result.split("\n").map(l => l.trim()).filter(l => l.length > 0);
            
            try {
                // 初始化批次處理 (Batch)
                const batch = writeBatch(db);
                
                // 假設從第二行開始是資料 (跳過標題)
                for(let i = 1; i < lines.length; i++) {
                    let row = lines[i].split(",").map(cell => cell.replace(/^"|"$/g, ''));
                    // 根據不同的 Collection 寫入不同邏輯
                    let docRef = doc(collection(db, targetCollection)); 
                    batch.set(docRef, {
                        // 此處依據您的表單欄位定義，例如：
                        powderId: row[0],
                        value: parseFloat(row[1]) || 0,
                        timestamp: new Date()
                    });
                }
                
                // 執行批次上傳 (非同步不卡頓)
                await batch.commit();
                alert("CSV 批次匯入成功！系統已更新。");
                
            } catch (error) {
                console.error("匯入失敗: ", error);
                alert("匯入過程中發生錯誤");
            }
        };
        reader.readAsText(fileInput.files[0], "UTF-8");
    };

    // --- 廢粉圓形百分比邏輯示範 ---
    function updateWasteDashboard(currentKg) {
        const maxKg = 10000; // 10噸
        let percentage = (currentKg / maxKg) * 100;
        if(percentage > 100) percentage = 100;
        
        // 更新 CSS Conic Gradient 圓形圖
        const chart = document.getElementById('wasteChart');
        const color = percentage > 80 ? 'var(--danger)' : (percentage > 50 ? 'var(--warning)' : 'var(--blue-powder)');
        chart.style.background = `conic-gradient(${color} ${percentage}%, #e2e8f0 0%)`;
        
        document.getElementById('wasteTon').innerText = (currentKg / 1000).toFixed(2);
        document.getElementById('wasteTotalKg').innerText = currentKg + " kg";
    }
    
    // 假資料測試圓形圖 (您可以替換為讀取 Firebase waste collection 的資料)
    setTimeout(() => { updateWasteDashboard(7500); }, 1000);

</script>
</body>
</html>
