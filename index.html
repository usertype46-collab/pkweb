<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>烤漆部粉體系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #2C3E50;
            --accent: #3498DB;
            --bg: #ECF0F1;
            --card-bg: #FFFFFF;
            --text: #333333;
            --danger: #E74C3C;
            --success: #2ECC71;
            --sidebar-width: 250px;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 側邊欄設計 */
        #sidebar { width: var(--sidebar-width); background: var(--primary); color: white; display: flex; flex-direction: column; overflow-y: auto; transition: 0.3s; }
        .sidebar-header { padding: 20px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-btn { padding: 15px 20px; background: none; border: none; color: #BDC3C7; text-align: left; font-size: 16px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .menu-btn:hover, .menu-btn.active { background: #34495E; color: white; border-left-color: var(--accent); }
        
        /* 主內容區 */
        #main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .page { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 卡片與表單 */
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        .form-group input:focus { border-color: var(--accent); outline: none; }
        
        /* 按鈕系統 */
        .btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-small { padding: 5px 10px; font-size: 12px; }
        .admin-only { display: none; } /* 權限控制 Class */

        /* 列表與特殊文字 */
        .record-list { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .record-list th, .record-list td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .record-list th { background: #f9f9f9; font-weight: bold; }
        .text-red { color: var(--danger) !important; font-weight: bold; }
        
        /* 登入彈窗 */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; text-align: center; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* 響應式 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; padding: 10px; }
            .sidebar-header { display: none; }
            .menu-btn { padding: 10px; font-size: 14px; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
            .menu-btn:hover, .menu-btn.active { border-bottom-color: var(--accent); }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="modal-content">
            <h2 style="color: var(--primary); margin-top: 0;">系統登入</h2>
            <div class="form-group">
                <input type="password" id="admin-pwd" placeholder="請輸入管理員密碼" autocomplete="off">
            </div>
            <button class="btn" style="width: 100%; justify-content: center; margin-bottom: 10px;" onclick="login(true)">管理員登入</button>
            <button class="btn btn-success" style="width: 100%; justify-content: center;" onclick="login(false)">檢視員身分進入</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">烤漆部粉體系統<br><span id="role-badge" style="font-size: 12px; color: var(--success);"></span></div>
        <button class="menu-btn active" onclick="switchPage('page-1', this)">1. 烤漆粉號清冊</button>
        <button class="menu-btn" onclick="switchPage('page-2', this)">2. 庫存監控</button>
        <button class="menu-btn" onclick="switchPage('page-3', this)">3. 採購入庫</button>
        <button class="menu-btn" onclick="switchPage('page-4', this)">4. 用量紀錄</button>
        <button class="menu-btn" onclick="switchPage('page-5', this)">5. 用量紀錄查詢</button>
        <button class="menu-btn" onclick="switchPage('page-6', this)">6. 庫存查詢</button>
        <button class="menu-btn" onclick="switchPage('page-7', this)">7. 廢粉登記</button>
        <button class="menu-btn" onclick="switchPage('page-8', this)">8. 廢粉查詢與圖表</button>
        <button class="menu-btn" style="margin-top: auto; color: var(--danger);" onclick="location.reload()">登出系統</button>
    </div>

    <div id="main-content">
        <div id="page-1" class="page active">
            <div class="card admin-only">
                <div class="card-header"><h3>新增粉號清冊</h3></div>
                <div class="form-grid">
                    <div class="form-group"><label>粉號</label><input type="text" id="p1-id"></div>
                    <div class="form-group"><label>代號</label><input type="text" id="p1-code"></div>
                    <div class="form-group"><label>色系</label><input type="text" id="p1-color"></div>
                    <div class="form-group">
                        <label>淨重</label>
                        <select id="p1-weight"><option value="20">20</option><option value="25">25</option></select>
                    </div>
                    <div class="form-group">
                        <label>廠商</label>
                        <select id="p1-vendor">
                            <option value="老虎">老虎</option><option value="國麗">國麗</option>
                            <option value="國邦">國邦</option><option value="台粉">台粉</option>
                            <option value="長誠">長誠</option><option value="高頻">高頻</option><option value="南寶">南寶</option>
                        </select>
                    </div>
                </div>
                <button class="btn" onclick="addRegistry()">新增紀錄</button>
                <button class="btn btn-success" onclick="triggerCSV('registry')">匯入 CSV</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <h3>清冊列表</h3>
                    <div>
                        <button class="btn btn-small admin-only" onclick="toggleArchived()">切換隱藏下架</button>
                        <button class="btn btn-small btn-success" onclick="exportCSV('registry')">匯出 CSV</button>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table class="record-list" id="registry-table">
                        <thead><tr><th>粉號</th><th>代號</th><th>色系</th><th>淨重</th><th>廠商</th><th>狀態</th><th class="admin-only">操作</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-2" class="page">
            <div class="card admin-only">
                <div class="card-header"><h3>庫存盤點與設定</h3></div>
                <div class="form-grid">
                    <div class="form-group"><label>粉號 (連結清冊)</label><select id="p2-id" onchange="loadInventoryForm()"></select></div>
                    <div class="form-group"><label>代號</label><input type="text" id="p2-code" readonly style="background:#eee"></div>
                    <div class="form-group"><label>淨重</label><input type="number" id="p2-weight" readonly style="background:#eee"></div>
                    <div class="form-group"><label>箱數 (手動盤點)</label><input type="number" id="p2-box" oninput="calcInv()"></div>
                    <div class="form-group"><label>散粉 (手動盤點)</label><input type="number" id="p2-loose" oninput="calcInv()"></div>
                    <div class="form-group"><label>總數量</label><input type="number" id="p2-total" readonly style="background:#eee"></div>
                    <div class="form-group"><label>安全庫存量設定</label><input type="number" id="p2-safe"></div>
                </div>
                <button class="btn" onclick="saveInventory()">更新/盤點寫入</button>
                <button class="btn btn-danger" onclick="clearInventory()">清除資料</button>
                <button class="btn btn-success" onclick="triggerCSV('inventory')">匯入庫存 CSV</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <h3>當前庫存狀態</h3>
                    <button class="btn btn-small btn-success" onclick="exportCSV('inventory')">匯出 CSV</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="record-list" id="inventory-table">
                        <thead><tr><th>粉號</th><th>代號</th><th>箱數</th><th>散粉</th><th>總數量</th><th>安全庫存</th><th>狀態警示</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-3" class="page">
            <div class="card admin-only">
                <div class="card-header"><h3>採購入庫登記</h3></div>
                <div class="form-grid">
                    <div class="form-group"><label>日期</label><input type="date" id="p3-date"></div>
                    <div class="form-group"><label>粉號</label><select id="p3-id" onchange="autoFillP3()"></select></div>
                    <div class="form-group"><label>代號</label><input type="text" id="p3-code" readonly style="background:#eee"></div>
                    <div class="form-group"><label>色系</label><input type="text" id="p3-color" readonly style="background:#eee"></div>
                    <div class="form-group"><label>淨重</label><input type="number" id="p3-weight" readonly style="background:#eee"></div>
                    <div class="form-group"><label>入庫箱數</label><input type="number" id="p3-box" oninput="calcPurchase()"></div>
                    <div class="form-group"><label>入庫散粉</label><input type="number" id="p3-loose" oninput="calcPurchase()"></div>
                    <div class="form-group"><label>總數量</label><input type="number" id="p3-total" readonly style="background:#eee"></div>
                </div>
                <button class="btn" onclick="addPurchase()">寫入紀錄並自動更新庫存</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <h3>採購流水帳</h3>
                    <div><button class="btn btn-small btn-success admin-only" onclick="triggerCSV('purchases')">匯入 CSV</button> <button class="btn btn-small btn-success" onclick="exportCSV('purchases')">匯出 CSV</button></div>
                </div>
                <div style="overflow-x: auto;">
                    <table class="record-list" id="purchase-table">
                        <thead><tr><th>日期</th><th>粉號</th><th>入庫箱數</th><th>入庫散粉</th><th>總數量</th><th class="admin-only">操作</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-4" class="page">
            <div class="card admin-only">
                <div class="card-header"><h3>用量扣除登記</h3></div>
                <div class="form-grid">
                    <div class="form-group"><label>日期</label><input type="date" id="p4-date"></div>
                    <div class="form-group"><label>粉號</label><select id="p4-id" onchange="autoFillP4()"></select></div>
                    <div class="form-group"><label>代號</label><input type="text" id="p4-code" readonly style="background:#eee"></div>
                    <div class="form-group"><label>色系</label><input type="text" id="p4-color" readonly style="background:#eee"></div>
                    <div class="form-group"><label>淨重</label><input type="number" id="p4-weight" readonly style="background:#eee"></div>
                    <div class="form-group"><label>當前總庫存</label><input type="number" id="p4-stock" readonly style="background:#eee"></div>
                    <div class="form-group"><label>扣除箱數</label><input type="number" id="p4-box" oninput="calcUsage()"></div>
                    <div class="form-group"><label>扣除散粉</label><input type="number" id="p4-loose" oninput="calcUsage()"></div>
                    <div class="form-group"><label>重量 (=淨重×箱數+散粉)</label><input type="number" id="p4-out-weight" readonly style="background:#eee"></div>
                    <div class="form-group"><label>回庫散粉</label><input type="number" id="p4-return" oninput="calcUsage()"></div>
                    <div class="form-group"><label class="text-red">實際用量</label><input type="number" id="p4-usage" class="text-red" readonly style="background:#ffebee"></div>
                </div>
                <button class="btn" onclick="addUsage()">寫入紀錄並扣除庫存</button>
            </div>
            <div class="card">
                <div class="card-header">
                    <h3>用量流水帳</h3>
                    <div><button class="btn btn-small btn-success admin-only" onclick="triggerCSV('usage')">匯入 CSV</button> <button class="btn btn-small btn-success" onclick="exportCSV('usage')">匯出 CSV</button></div>
                </div>
                <div style="overflow-x: auto;">
                    <table class="record-list" id="usage-table">
                        <thead><tr><th>日期</th><th>粉號</th><th>扣除箱數</th><th>扣除散粉</th><th>回庫</th><th>實際用量</th><th class="admin-only">操作</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-5" class="page">
            <div class="card">
                <div class="card-header"><h3>用量依日期查詢</h3></div>
                <div class="form-group">
                    <label>選擇查詢日期</label>
                    <select id="p5-date" onchange="renderUsageQuery()"></select>
                </div>
                <div id="p5-result" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div id="page-6" class="page">
            <div class="card">
                <div class="card-header"><h3>庫存細節查詢</h3></div>
                <div class="form-group">
                    <label>選擇 粉號 & 代號</label>
                    <select id="p6-id" onchange="renderInventoryQuery()"></select>
                </div>
                <div id="p6-result" style="margin-top: 20px; font-size: 18px; line-height: 1.6;"></div>
            </div>
        </div>

        <div id="page-7" class="page">
            <div class="card admin-only">
                <div class="card-header"><h3>新增廢粉紀錄</h3></div>
                <div class="form-grid">
                    <div class="form-group"><label>日期</label><input type="date" id="p7-date"></div>
                    <div class="form-group"><label>數量</label><input type="number" id="p7-qty" oninput="calcWaste()"></div>
                    <div class="form-group"><label>淨重</label><input type="number" id="p7-weight" value="25" readonly style="background:#eee"></div>
                    <div class="form-group"><label>總重 (=數量×淨重)</label><input type="number" id="p7-total" readonly style="background:#eee"></div>
                </div>
                <button class="btn" onclick="addWaste()">新增紀錄</button>
            </div>
             <div class="card">
                <div class="card-header">
                    <h3>廢粉流水帳</h3>
                    <div><button class="btn btn-small btn-success admin-only" onclick="triggerCSV('waste')">匯入 CSV</button> <button class="btn btn-small btn-success" onclick="exportCSV('waste')">匯出 CSV</button></div>
                </div>
                <table class="record-list" id="waste-table">
                    <thead><tr><th>日期</th><th>數量</th><th>總重(kg)</th><th class="admin-only">操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="page-8" class="page">
            <div class="card">
                <div class="card-header"><h3>廢粉統計數據</h3><button class="btn btn-danger admin-only" onclick="resetWaste()">重置廢粉紀錄</button></div>
                <div class="form-grid">
                    <div id="p8-stats" style="font-size: 16px; line-height: 1.8;"></div>
                    <div style="max-width: 300px; margin: 0 auto;">
                        <canvas id="wasteChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="handleCSVImport(event)">
    </div>

    <script>
        // ==========================================
        // 1. Firebase 初始化設定 (請替換為你的設定)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDTIMGBYqAqOpFcCqEMjWWUwC_nPAfQ9ko",
        authDomain: "paint-system-21867.firebaseapp.com",
        databaseURL: "https://paint-system-21867-default-rtdb.firebaseio.com",
        projectId: "paint-system-21867",
        storageBucket: "paint-system-21867.firebasestorage.app",
        messagingSenderId: "855614444799",
        appId: "1:855614444799:web:db649669302532ea4aa8ca"
        };
        // 若使用真實 Firebase，請解開下方註解
        // firebase.initializeApp(firebaseConfig);
        // const dbRef = firebase.database().ref('coatingApp');

        // ==========================================
        // 2. 系統狀態與資料結構
        // ==========================================
        const ADMIN_PWD = 'M0282';
        let isAdmin = false;
        let hideArchived = false;
        let currentTargetCSV = '';
        let wasteChartInstance = null;

        // 本地快取 (若是無 Firebase 測試環境，先預設空物件)
        let appData = {
            registry: [],
            inventory: {},
            purchases: [],
            usage: [],
            waste: []
        };

        // 【若不使用 Firebase，保留 LocalStorage 作為備案】
        const localDB = {
            save: () => localStorage.setItem('coatingData', JSON.stringify(appData)),
            load: () => {
                let saved = localStorage.getItem('coatingData');
                if(saved) appData = JSON.parse(saved);
            }
        };
        localDB.load(); // 初始化讀取

        // ==========================================
        // 3. 權限控管與登入
        // ==========================================
        function login(attemptAdmin) {
            if (attemptAdmin) {
                let pwd = document.getElementById('admin-pwd').value;
                if (pwd === ADMIN_PWD) {
                    isAdmin = true;
                    document.getElementById('role-badge').innerText = '身分：管理員';
                    Swal.fire({icon: 'success', title: '登入成功', timer: 1000, showConfirmButton: false});
                } else {
                    Swal.fire({icon: 'error', title: '密碼錯誤'});
                    return;
                }
            } else {
                isAdmin = false;
                document.getElementById('role-badge').innerText = '身分：檢視員';
                document.getElementById('role-badge').style.color = '#BDC3C7';
            }
            
            document.getElementById('login-modal').style.display = 'none';
            applyRoleUI();
            
            // 初始化日期
            const today = new Date().toISOString().split('T')[0];
            ['p3-date', 'p4-date', 'p7-date'].forEach(id => document.getElementById(id).value = today);
            
            // 渲染所有畫面
            refreshAllViews();
        }

        function applyRoleUI() {
            let elements = document.querySelectorAll('.admin-only');
            elements.forEach(el => {
                el.style.display = isAdmin ? '' : 'none';
            });
        }

        // ==========================================
        // 4. 共用資料操作與同步
        // ==========================================
        function syncData() {
            // 如果有連結 Firebase： dbRef.set(appData);
            localDB.save(); // LocalStorage 備案
            refreshAllViews();
        }

        function switchPage(pageId, btnEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btnEl.classList.add('active');
            
            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').scrollLeft = btnEl.offsetLeft - 20;
            }

            if(pageId === 'page-8') renderWasteChart();
        }

        function refreshAllViews() {
            renderRegistry();
            renderInventory();
            renderPurchases();
            renderUsage();
            renderWaste();
            populateDropdowns();
            renderWasteChart();
        }

        function populateDropdowns() {
            let reg = appData.registry.filter(r => !r.archived);
            let options = '<option value="">請選擇</option>';
            let optionsWithCode = '<option value="">請選擇</option>';
            reg.forEach(r => {
                options += `<option value="${r.id}">${r.id}</option>`;
                optionsWithCode += `<option value="${r.id}">${r.id} - ${r.code}</option>`;
            });
            document.getElementById('p2-id').innerHTML = options;
            document.getElementById('p3-id').innerHTML = options;
            document.getElementById('p4-id').innerHTML = options;
            document.getElementById('p6-id').innerHTML = optionsWithCode;

            // Page 5 日期
            let dates = [...new Set(appData.usage.map(u => u.date))].sort().reverse();
            let dOptions = '<option value="">請選擇日期</option>';
            dates.forEach(d => dOptions += `<option value="${d}">${d}</option>`);
            document.getElementById('p5-date').innerHTML = dOptions;
        }

        // ==========================================
        // 5. 各模組核心邏輯
        // ==========================================
        
        // --- 1. 清冊 ---
        function addRegistry() {
            let id = document.getElementById('p1-id').value.trim();
            if(!id) return Swal.fire('錯誤', '粉號不可為空', 'error');
            if(appData.registry.find(r => r.id === id)) return Swal.fire('錯誤', '粉號已存在', 'error');
            
            appData.registry.push({
                id, code: document.getElementById('p1-code').value,
                color: document.getElementById('p1-color').value,
                weight: parseInt(document.getElementById('p1-weight').value),
                vendor: document.getElementById('p1-vendor').value,
                archived: false
            });
            if(!appData.inventory[id]) appData.inventory[id] = { box: 0, loose: 0, safe: 0 };
            syncData();
            Swal.fire({icon:'success', title:'新增成功', timer:1000, showConfirmButton:false});
            document.getElementById('p1-id').value = '';
        }

        function toggleArchived() { hideArchived = !hideArchived; renderRegistry(); }
        
        function toggleArchiveStatus(index) {
            appData.registry[index].archived = !appData.registry[index].archived;
            syncData();
        }

        function deleteItem(type, index) {
            Swal.fire({ title: '確定刪除？', icon: 'warning', showCancelButton: true, confirmButtonText: '刪除' }).then((result) => {
                if(result.isConfirmed) {
                    appData[type].splice(index, 1);
                    syncData();
                }
            });
        }

        function renderRegistry() {
            let tbody = document.querySelector('#registry-table tbody');
            tbody.innerHTML = '';
            appData.registry.forEach((r, i) => {
                if (hideArchived && r.archived) return;
                let tr = `<tr>
                    <td><strong>${r.id}</strong></td><td>${r.code}</td><td>${r.color}</td>
                    <td>${r.weight}kg</td><td>${r.vendor}</td>
                    <td><span class="${r.archived?'text-red':''}">${r.archived ? '已下架' : '使用中'}</span></td>
                    <td class="admin-only">
                        <button class="btn btn-small" onclick="toggleArchiveStatus(${i})">${r.archived?'上架':'下架'}</button>
                        <button class="btn btn-danger btn-small" onclick="deleteItem('registry', ${i})">刪除</button>
                    </td>
                </tr>`;
                tbody.innerHTML += tr;
            });
            applyRoleUI();
        }

        // --- 2. 庫存 ---
        function loadInventoryForm() {
            let id = document.getElementById('p2-id').value;
            if(!id) return;
            let r = appData.registry.find(x => x.id === id);
            let i = appData.inventory[id] || {box:0, loose:0, safe:0};
            document.getElementById('p2-code').value = r.code;
            document.getElementById('p2-weight').value = r.weight;
            document.getElementById('p2-box').value = i.box;
            document.getElementById('p2-loose').value = i.loose;
            document.getElementById('p2-safe').value = i.safe || 0;
            calcInv();
        }
        function calcInv() {
            let w = parseInt(document.getElementById('p2-weight').value) || 0;
            let b = parseInt(document.getElementById('p2-box').value) || 0;
            let l = parseFloat(document.getElementById('p2-loose').value) || 0;
            document.getElementById('p2-total').value = (w * b) + l;
        }
        function saveInventory() {
            let id = document.getElementById('p2-id').value;
            if(!id) return Swal.fire('提示', '請選擇粉號', 'info');
            appData.inventory[id] = {
                box: parseInt(document.getElementById('p2-box').value) || 0,
                loose: parseFloat(document.getElementById('p2-loose').value) || 0,
                safe: parseInt(document.getElementById('p2-safe').value) || 0
            };
            syncData();
            Swal.fire({icon:'success', title:'庫存更新成功', timer:1000, showConfirmButton:false});
        }
        function clearInventory() {
            let id = document.getElementById('p2-id').value;
            if(!id) return;
            appData.inventory[id] = {box:0, loose:0, safe:0};
            loadInventoryForm();
            syncData();
        }
        function renderInventory() {
            let tbody = document.querySelector('#inventory-table tbody');
            tbody.innerHTML = '';
            appData.registry.forEach((r) => {
                let i = appData.inventory[r.id] || {box:0, loose:0, safe:0};
                let total = (r.weight * i.box) + i.loose;
                let tr = `<tr>
                    <td><strong>${r.id}</strong></td><td>${r.code}</td>
                    <td>${i.box}</td><td>${i.loose}</td><td><strong>${total}</strong></td><td>${i.safe}</td>
                    <td>${total < i.safe ? '<span class="text-red">⚠ 低於安全</span>' : '<span style="color:var(--success)">正常</span>'}</td>
                </tr>`;
                tbody.innerHTML += tr;
            });
        }

        // --- 3. 入庫 ---
        function autoFillP3() {
            let id = document.getElementById('p3-id').value;
            let r = appData.registry.find(x => x.id === id);
            document.getElementById('p3-code').value = r.code;
            document.getElementById('p3-color').value = r.color;
            document.getElementById('p3-weight').value = r.weight;
            calcPurchase();
        }
        function calcPurchase() {
            let w = parseInt(document.getElementById('p3-weight').value) || 0;
            let b = parseInt(document.getElementById('p3-box').value) || 0;
            let l = parseFloat(document.getElementById('p3-loose').value) || 0;
            document.getElementById('p3-total').value = (w * b) + l;
        }
        function addPurchase() {
            let id = document.getElementById('p3-id').value;
            if(!id) return;
            let b = parseInt(document.getElementById('p3-box').value) || 0;
            let l = parseFloat(document.getElementById('p3-loose').value) || 0;
            
            appData.purchases.push({
                date: document.getElementById('p3-date').value,
                id: id, box: b, loose: l,
                total: document.getElementById('p3-total').value
            });
            if(!appData.inventory[id]) appData.inventory[id] = {box:0, loose:0, safe:0};
            appData.inventory[id].box += b;
            appData.inventory[id].loose += l;
            syncData();
            Swal.fire({icon:'success', title:'入庫成功', timer:1000, showConfirmButton:false});
            ['p3-box','p3-loose','p3-total'].forEach(i => document.getElementById(i).value = '');
        }
        function renderPurchases() {
            let tbody = document.querySelector('#purchase-table tbody');
            tbody.innerHTML = '';
            [...appData.purchases].reverse().forEach((p, i) => {
                let actualIndex = appData.purchases.length - 1 - i;
                tbody.innerHTML += `<tr>
                    <td>${p.date}</td><td><strong>${p.id}</strong></td>
                    <td>${p.box}箱</td><td>${p.loose}kg</td><td>${p.total}kg</td>
                    <td class="admin-only"><button class="btn btn-danger btn-small" onclick="deleteItem('purchases', ${actualIndex})">刪除</button></td>
                </tr>`;
            });
            applyRoleUI();
        }

        // --- 4. 用量 ---
        function autoFillP4() {
            let id = document.getElementById('p4-id').value;
            let r = appData.registry.find(x=>x.id===id);
            let i = appData.inventory[id];
            document.getElementById('p4-code').value = r.code;
            document.getElementById('p4-color').value = r.color;
            document.getElementById('p4-weight').value = r.weight;
            document.getElementById('p4-stock').value = (r.weight * i.box) + i.loose;
            calcUsage();
        }
        function calcUsage() {
            let w = parseInt(document.getElementById('p4-weight').value) || 0;
            let b = parseInt(document.getElementById('p4-box').value) || 0;
            let l = parseFloat(document.getElementById('p4-loose').value) || 0;
            let ret = parseFloat(document.getElementById('p4-return').value) || 0;
            let weight = (w * b) + l;
            document.getElementById('p4-out-weight').value = weight;
            document.getElementById('p4-usage').value = weight - ret;
        }
        function addUsage() {
            let id = document.getElementById('p4-id').value;
            if(!id) return;
            let b = parseInt(document.getElementById('p4-box').value) || 0;
            let l = parseFloat(document.getElementById('p4-loose').value) || 0;
            let ret = parseFloat(document.getElementById('p4-return').value) || 0;
            let usage = parseFloat(document.getElementById('p4-usage').value) || 0;

            appData.inventory[id].box -= b;
            appData.inventory[id].loose -= l;
            appData.inventory[id].loose += ret;

            appData.usage.push({ date: document.getElementById('p4-date').value, id: id, box: b, loose: l, ret: ret, usage: usage });
            syncData();
            Swal.fire({icon:'success', title:'用量登記成功', timer:1000, showConfirmButton:false});
            autoFillP4();
        }
        function renderUsage() {
            let tbody = document.querySelector('#usage-table tbody');
            tbody.innerHTML = '';
            [...appData.usage].reverse().forEach((u, i) => {
                let actualIdx = appData.usage.length - 1 - i;
                tbody.innerHTML += `<tr>
                    <td>${u.date}</td><td><strong>${u.id}</strong></td>
                    <td>${u.box}箱</td><td>${u.loose}kg</td><td>${u.ret}kg</td><td class="text-red">${u.usage}kg</td>
                    <td class="admin-only"><button class="btn btn-danger btn-small" onclick="deleteItem('usage', ${actualIdx})">刪除</button></td>
                </tr>`;
            });
            applyRoleUI();
        }

        // --- 5 & 6. 查詢 ---
        function renderUsageQuery() {
            let date = document.getElementById('p5-date').value;
            let html = '';
            let usgs = appData.usage.filter(u => u.date === date);
            usgs.forEach(u => {
                let r = appData.registry.find(x=>x.id===u.id);
                html += `<div style="padding:10px; border-bottom:1px solid #ccc"><strong>${u.id} (${r.code})</strong> - 領出: ${u.box}箱 ${u.loose}散粉 | 回庫: ${u.ret} | <span class="text-red">實際: ${u.usage}kg</span></div>`;
            });
            document.getElementById('p5-result').innerHTML = html || '無紀錄';
        }
        function renderInventoryQuery() {
            let id = document.getElementById('p6-id').value;
            if(!id) return;
            let r = appData.registry.find(x=>x.id===id);
            let i = appData.inventory[id] || {box:0, loose:0};
            let total = (r.weight * i.box) + i.loose;
            document.getElementById('p6-result').innerHTML = `粉號: <strong>${r.id}</strong><br>代號: ${r.code}<br>色系: ${r.color}<br>淨重: ${r.weight}kg<br>目前細節: ${i.box} 箱 + ${i.loose} 散粉<br><span class="text-red" style="font-size:24px">總重: ${total} kg</span>`;
        }

        // --- 7 & 8. 廢粉 ---
        function calcWaste() {
            let q = parseInt(document.getElementById('p7-qty').value) || 0;
            let w = parseInt(document.getElementById('p7-weight').value) || 25;
            document.getElementById('p7-total').value = q * w;
        }
        function addWaste() {
            appData.waste.push({
                date: document.getElementById('p7-date').value,
                qty: parseInt(document.getElementById('p7-qty').value) || 0,
                total: parseInt(document.getElementById('p7-total').value) || 0
            });
            syncData();
            Swal.fire('成功', '廢粉已記錄', 'success');
        }
        function renderWaste() {
            let tbody = document.querySelector('#waste-table tbody');
            tbody.innerHTML = '';
            [...appData.waste].reverse().forEach((w, i) => {
                let idx = appData.waste.length - 1 - i;
                tbody.innerHTML += `<tr><td>${w.date}</td><td>${w.qty}箱</td><td>${w.total}kg</td><td class="admin-only"><button class="btn btn-danger btn-small" onclick="deleteItem('waste', ${idx})">刪除</button></td></tr>`;
            });
            applyRoleUI();
        }
        function resetWaste() {
            Swal.fire({title:'警告',text:'將清空所有廢粉紀錄',icon:'warning',showCancelButton:true}).then(r=>{
                if(r.isConfirmed){ appData.waste=[]; syncData(); }
            });
        }
        function renderWasteChart() {
            if(document.getElementById('page-8').className.indexOf('active') === -1) return;
            let totalWeight = appData.waste.reduce((acc, curr) => acc + curr.total, 0);
            let tons = totalWeight / 1000;
            let percentage = Math.min((tons / 10) * 100, 100);

            document.getElementById('p8-stats').innerHTML = `
                歷史總回收頓數：<strong style="font-size:24px; color:${tons>=10?'var(--danger)':'var(--primary)'}">${tons.toFixed(3)} 噸</strong><br>
                10噸警示進度：${percentage.toFixed(1)}%<br>
                ${tons >= 10 ? '<span class="text-red">⚠ 注意：已達到 10 噸清運標準！</span>' : ''}
            `;

            let ctx = document.getElementById('wasteChart').getContext('2d');
            if(wasteChartInstance) wasteChartInstance.destroy();
            wasteChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['已回收(噸)', '剩餘額度(噸)'], datasets: [{ data: [tons, Math.max(10 - tons, 0)], backgroundColor: [tons >= 10 ? '#E74C3C' : '#3498DB', '#ECF0F1'] }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        // ==========================================
        // 6. CSV 匯出與匯入功能
        // ==========================================
        function exportCSV(type) {
            let data = appData[type];
            if(!data || data.length === 0) {
                // 如果是 inventory 物件要轉陣列
                if(type === 'inventory') {
                    data = Object.keys(data).map(k => ({id: k, box: data[k].box, loose: data[k].loose, safe: data[k].safe}));
                } else {
                    return Swal.fire('提示', '沒有資料可匯出', 'info');
                }
            }
            let headers = Object.keys(data[0]).join(',') + '\n';
            let rows = data.map(obj => Object.values(obj).join(',')).join('\n');
            let blob = new Blob(["\uFEFF" + headers + rows], { type: 'text/csv;charset=utf-8;' }); // 加 BOM 避免 Excel 亂碼
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `粉體系統_${type}_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function triggerCSV(type) {
            currentTargetCSV = type;
            document.getElementById('csvFileInput').click();
        }

        function handleCSVImport(event) {
            let file = event.target.files[0];
            if(!file) return;
            Swal.fire({
                title: '警告', text: '批次匯入將會覆蓋該區塊現有資料！', icon: 'warning', showCancelButton: true, confirmButtonText: '強制匯入'
            }).then((result) => {
                if(result.isConfirmed) {
                    let reader = new FileReader();
                    reader.onload = function(e) {
                        let text = e.target.result;
                        let lines = text.split('\n').filter(l => l.trim() !== '');
                        let headers = lines[0].split(',').map(h => h.trim());
                        let resultArr = [];
                        
                        for(let i=1; i<lines.length; i++){
                            let obj = {};
                            let currentline = lines[i].split(',');
                            headers.forEach((h, index) => {
                                let val = currentline[index]?.trim();
                                // 嘗試轉數字或布林
                                if(!isNaN(val) && val !== '') val = Number(val);
                                else if(val === 'true') val = true;
                                else if(val === 'false') val = false;
                                obj[h] = val;
                            });
                            resultArr.push(obj);
                        }

                        if(currentTargetCSV === 'inventory') {
                            let invObj = {};
                            resultArr.forEach(item => { invObj[item.id] = { box: item.box, loose: item.loose, safe: item.safe }; });
                            appData.inventory = invObj;
                        } else {
                            appData[currentTargetCSV] = resultArr;
                        }
                        syncData();
                        Swal.fire('成功', '資料已成功匯入', 'success');
                    };
                    reader.readAsText(file);
                }
                event.target.value = ''; // reset file input
            });
        }
    </script>
</body>
</html>
