<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>烤漆部粉體雲端系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --border: #E5E7EB;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 頁面切換 */
        .page { display: none; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI 美化 */
        .card { background: var(--card-bg); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .main-title { font-size: 28px; color: var(--primary); text-align: center; margin: 30px 0; font-weight: bold; }
        
        /* 按鈕與表單 */
        .btn {
            background: var(--primary); color: white; border: none; padding: 10px 18px; 
            border-radius: 8px; font-size: 15px; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .action-btns { display: flex; gap: 8px; margin-top: 10px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .menu-btn {
            padding: 20px; background: var(--card-bg); border: 2px solid var(--border);
            border-radius: 12px; font-size: 16px; font-weight: 600; color: var(--text);
            cursor: pointer; transition: all 0.2s; text-align: left;
        }
        .menu-btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 12px rgba(37,99,235,0.1); }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--text-light); font-size: 14px;}
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        /* 清單與特殊狀態 */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .record-item { border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; background: #fafafa; }
        .text-red { color: var(--danger); font-weight: bold; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-safe { background: #D1FAE5; color: #065F46; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }

        /* 進度條設計 */
        .progress-container { width: 100%; background-color: var(--border); border-radius: 10px; overflow: hidden; margin: 15px 0; height: 20px; }
        .progress-bar { height: 100%; background-color: var(--warning); transition: width 0.5s ease; text-align: center; color: white; font-size: 12px; line-height: 20px;}
        .progress-bar.alert { background-color: var(--danger); }

        /* 隱藏未授權的元素 */
        .admin-only { display: none; }
        body.is-admin .admin-only { display: inline-block; }
        body.is-admin .admin-only-block { display: block; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="main-title">烤漆部粉體雲端系統</div>
        
        <div class="card" id="login-section">
            <h3 style="margin-top:0">系統身分驗證</h3>
            <div class="form-group">
                <input type="password" id="sys-pwd" placeholder="請輸入管理員密碼 (訪客可留白)">
            </div>
            <div class="action-btns">
                <button class="btn" onclick="login()">登入系統</button>
            </div>
            <p id="login-status" style="color: var(--success); font-weight: bold; margin-top: 10px;"></p>
        </div>

        <div class="menu-grid" id="menu-section" style="display: none;">
            <button class="menu-btn" onclick="showPage('page-1')">📦 1. 烤漆粉號清冊</button>
            <button class="menu-btn" onclick="showPage('page-2')">📊 2. 庫存監控</button>
            <button class="menu-btn" onclick="showPage('page-3')">📥 3. 採購入庫</button>
            <button class="menu-btn" onclick="showPage('page-4')">📤 4. 用量紀錄</button>
            <button class="menu-btn" onclick="showPage('page-5')">🔍 5. 用量紀錄查詢</button>
            <button class="menu-btn" onclick="showPage('page-6')">🔎 6. 庫存查詢</button>
            <button class="menu-btn" onclick="showPage('page-7')">♻️ 7. 廢粉登記</button>
            <button class="menu-btn" onclick="showPage('page-8')">📈 8. 廢粉統計查詢</button>
        </div>
    </div>

    <div id="page-1" class="page">
        <div class="nav-bar"><button class="btn btn-outline" onclick="goHome()">← 返回首頁</button><h2>1. 烤漆粉號清冊</h2></div>
        <div class="card admin-only-block admin-only">
            <div class="form-group"><label>粉號 (系統將自動處理包含 / 的字元)</label><input type="text" id="p1-id"></div>
            <div class="form-group"><label>代號</label><input type="text" id="p1-code"></div>
            <div class="form-group"><label>色系</label><input type="text" id="p1-color"></div>
            <div class="form-group"><label>淨重 (kg)</label><input type="number" id="p1-weight" value="25"></div>
            <div class="form-group"><label>廠商</label><input type="text" id="p1-vendor" placeholder="例如: 老虎, 國麗"></div>
            <button class="btn" onclick="addRegistry()">新增 / 更新清冊</button>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0">
            <input type="file" id="csv-upload-p1" accept=".csv" style="display:none" onchange="importCSV(event, 'registry')">
            <button class="btn btn-warning" onclick="document.getElementById('csv-upload-p1').click()">匯入 CSV</button>
        </div>
        <div class="card">
            <div class="action-btns" style="margin-bottom: 15px;">
                <button class="btn btn-outline" onclick="exportCSV('registry')">匯出 CSV</button>
            </div>
            <div id="registry-list"></div>
        </div>
    </div>

    <div id="page-7" class="page">
        <div class="nav-bar"><button class="btn btn-outline" onclick="goHome()">← 返回首頁</button><h2>7. 廢粉登記</h2></div>
        <div class="card admin-only-block admin-only">
            <div class="form-group"><label>日期</label><input type="date" id="p7-date"></div>
            <div class="form-group"><label>包裝數量</label><input type="number" id="p7-qty" oninput="calcWaste()"></div>
            <div class="form-group"><label>單件淨重 (kg)</label><input type="number" id="p7-weight" value="25" readonly></div>
            <div class="form-group"><label>總重 (kg)</label><input type="number" id="p7-total" readonly></div>
            <button class="btn" onclick="addWaste()">新增紀錄</button>
        </div>
        <div class="card">
            <h3>近期登記紀錄</h3>
            <div id="waste-record-list"></div>
        </div>
    </div>

    <div id="page-8" class="page">
        <div class="nav-bar"><button class="btn btn-outline" onclick="goHome()">← 返回首頁</button><h2>8. 廢粉統計查詢</h2></div>
        <div class="card">
            <h3>回收指數與警示</h3>
            <div id="p8-stats" style="font-size: 16px; line-height: 1.6;"></div>
            
            <div style="margin-top:20px;">
                <label style="font-weight:bold;">距離 10 噸警示值進度：</label>
                <div class="progress-container">
                    <div id="waste-progress" class="progress-bar" style="width: 0%;">0%</div>
                </div>
            </div>
            
            <div class="admin-only-block admin-only" style="margin-top:20px;">
                <button class="btn btn-danger" onclick="resetWaste()">清空廢粉數據 (重置週期)</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ==========================================
        // ⚠️ 請填入您的 Firebase 配置金鑰
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDTIMGBYqAqOpFcCqEMjWWUwC_nPAfQ9ko",
        authDomain: "paint-system-21867.firebaseapp.com",
        databaseURL: "https://paint-system-21867-default-rtdb.firebaseio.com",
        projectId: "paint-system-21867",
        storageBucket: "paint-system-21867.firebasestorage.app",
        messagingSenderId: "855614444799",
        appId: "1:855614444799:web:db649669302532ea4aa8ca"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 全域變數與輔助函式 ---
        window.isAdmin = false;
        const ADMIN_PWD = "m0282"; // 請在此設定您的管理員密碼

        // Firebase 的 Key 不能包含 '/', 取代為 '_-_'
        window.encodeKey = (id) => id.toString().split('/').join('_-_');
        window.decodeKey = (id) => id.toString().split('_-_').join('/');

        // 登入驗證
        window.login = () => {
            const pwd = document.getElementById('sys-pwd').value;
            if (pwd === ADMIN_PWD) {
                window.isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('login-status').innerText = "✅ 已切換為：管理員模式";
            } else {
                window.isAdmin = false;
                document.body.classList.remove('is-admin');
                document.getElementById('login-status').innerText = "👁️ 已切換為：訪客檢視模式";
            }
            document.getElementById('menu-section').style.display = 'grid';
            
            // 初始化基礎日期
            const today = new Date().toISOString().split('T')[0];
            if(document.getElementById('p7-date')) document.getElementById('p7-date').value = today;
        };

        window.goHome = () => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('home-page').classList.add('active');
        };

        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId === 'page-1') loadRegistry();
            if (pageId === 'page-7') loadWasteRecords();
            if (pageId === 'page-8') loadWasteStats();
            // ...其他頁面的初始化綁定
        };

        // ==========================================
        // 模組一：烤漆粉號清冊 (CRUD 與 Firebase 寫入)
        // ==========================================
        window.addRegistry = async () => {
            if (!window.isAdmin) return alert("權限不足");
            const id = document.getElementById('p1-id').value.trim();
            if(!id) return alert('粉號不可為空');
            
            const encodedId = encodeKey(id);
            const data = {
                id: id,
                code: document.getElementById('p1-code').value,
                color: document.getElementById('p1-color').value,
                weight: parseInt(document.getElementById('p1-weight').value) || 0,
                vendor: document.getElementById('p1-vendor').value
            };

            // 寫入 Firebase
            await set(ref(db, 'registry/' + encodedId), data);
            
            // 同步初始化庫存歸零
            const invSnapshot = await get(ref(db, 'inventory/' + encodedId));
            if (!invSnapshot.exists()) {
                await set(ref(db, 'inventory/' + encodedId), { box: 0, loose: 0, safe: 0 });
            }

            alert('✅ 儲存成功');
            loadRegistry();
        };

        window.deleteRegistry = async (encodedId) => {
            if (!window.isAdmin) return alert("權限不足");
            if (confirm(`確定要刪除粉號 ${decodeKey(encodedId)} 嗎？`)) {
                await remove(ref(db, 'registry/' + encodedId));
                loadRegistry();
            }
        };

        window.loadRegistry = async () => {
            const snapshot = await get(ref(db, 'registry'));
            let html = '';
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const key in data) {
                    const r = data[key];
                    html += `
                    <div class="record-item">
                        <strong>粉號: ${r.id}</strong> | 代號: ${r.code} | 色系: ${r.color}<br>
                        淨重: ${r.weight}kg | 廠商: ${r.vendor}
                        <div class="action-btns admin-only">
                            <button class="btn btn-danger btn-outline" style="padding:4px 8px; font-size:12px;" onclick="deleteRegistry('${key}')">刪除</button>
                        </div>
                    </div>`;
                }
            } else {
                html = '<p>尚無紀錄</p>';
            }
            document.getElementById('registry-list').innerHTML = html;
        };

        // ==========================================
        // 模組二：廢粉登記與圖表分析 (Page 7 & 8)
        // ==========================================
        window.calcWaste = () => {
            const q = parseInt(document.getElementById('p7-qty').value) || 0;
            const w = parseInt(document.getElementById('p7-weight').value) || 25;
            document.getElementById('p7-total').value = q * w;
        };

        window.addWaste = async () => {
            if (!window.isAdmin) return alert("權限不足");
            const date = document.getElementById('p7-date').value;
            const timestamp = new Date().getTime(); // 產生唯一鍵值
            const data = {
                date: date,
                qty: parseInt(document.getElementById('p7-qty').value) || 0,
                total: parseInt(document.getElementById('p7-total').value) || 0
            };

            await set(ref(db, 'waste/' + timestamp), data);
            alert('✅ 廢粉紀錄已新增');
            loadWasteRecords();
        };

        window.deleteWaste = async (key) => {
             if (!window.isAdmin) return alert("權限不足");
             if(confirm('確定刪除此筆紀錄？')) {
                 await remove(ref(db, 'waste/' + key));
                 loadWasteRecords();
             }
        };

        window.loadWasteRecords = async () => {
            const snapshot = await get(ref(db, 'waste'));
            let html = '';
            if (snapshot.exists()) {
                const data = snapshot.val();
                // 轉為陣列以便排序反轉 (最新的在上)
                const arr = Object.keys(data).map(k => ({ key: k, ...data[k] })).reverse();
                arr.forEach(w => {
                    html += `
                    <div class="record-item">
                        <strong>${w.date}</strong> | 數量: ${w.qty} 件 | 總重: ${w.total} kg
                        <div class="action-btns admin-only">
                             <button class="btn btn-danger btn-outline" style="padding:4px 8px; font-size:12px;" onclick="deleteWaste('${w.key}')">刪除</button>
                        </div>
                    </div>`;
                });
            } else {
                html = '<p>無廢粉紀錄</p>';
            }
            document.getElementById('waste-record-list').innerHTML = html;
        };

        window.loadWasteStats = async () => {
            const snapshot = await get(ref(db, 'waste'));
            let totalWeight = 0;
            let count = 0;
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const key in data) {
                    totalWeight += data[key].total;
                    count++;
                }
            }

            const tons = totalWeight / 1000;
            const isAlert = tons >= 10;
            
            // 進度條計算 (上限 10 噸)
            let percent = (totalWeight / 10000) * 100;
            if (percent > 100) percent = 100;
            
            const bar = document.getElementById('waste-progress');
            bar.style.width = percent + '%';
            bar.innerText = percent.toFixed(1) + '%';
            if(isAlert) {
                bar.classList.add('alert');
            } else {
                bar.classList.remove('alert');
            }

            document.getElementById('p8-stats').innerHTML = `
                登記總筆數：${count} 筆<br>
                廢粉回收總重：<span class="${isAlert ? 'text-red' : ''}" style="font-size:20px; font-weight:bold;">${tons.toFixed(3)} 噸</span>
                ${isAlert ? '<br><span class="text-red">⚠ 警告：已達到或超過 10 噸清運標準！</span>' : ''}
            `;
        };

        window.resetWaste = async () => {
            if (!window.isAdmin) return alert("權限不足");
            if(confirm('⚠️ 警告：這將會清空所有歷史廢粉數據！確定重置嗎？')) {
                await remove(ref(db, 'waste'));
                alert('已清空數據');
                loadWasteStats();
            }
        };

        // ==========================================
        // 模組三：CSV 匯入與匯出 (PapaParse)
        // ==========================================
        window.exportCSV = async (nodePath) => {
            const snapshot = await get(ref(db, nodePath));
            if (!snapshot.exists()) return alert('無資料可匯出');
            
            const data = snapshot.val();
            const arr = [];
            for (const key in data) { arr.push(data[key]); }
            
            const csv = Papa.unparse(arr);
            const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' }); // 加上 BOM 處理 Excel 中文亂碼
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${nodePath}_export.csv`;
            link.click();
        };

        window.importCSV = (event, nodePath) => {
            if (!window.isAdmin) return alert("權限不足");
            const file = event.target.files[0];
            if (!file) return;

            if(!confirm('⚠️ 批次匯入警告：\n系統將會進行批次處理，若「粉號」重複，將會覆蓋原本雲端資料。確認執行？')) {
                event.target.value = '';
                return;
            }

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    let importedCount = 0;
                    for (const row of results.data) {
                        // 驗證必要欄位是否齊全
                        if(nodePath === 'registry' && row.id) {
                            const encodedId = encodeKey(row.id);
                            // 格式化確保寫入正確型別
                            row.weight = parseInt(row.weight) || 0;
                            await set(ref(db, nodePath + '/' + encodedId), row);
                            importedCount++;
                        }
                    }
                    alert(`✅ 成功匯入 ${importedCount} 筆資料`);
                    event.target.value = '';
                    if (nodePath === 'registry') loadRegistry();
                }
            });
        };
    </script>
</body>
</html>
