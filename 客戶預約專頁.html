<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神の指藝預約系統 | Beautiful moment.</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 品牌色系：優雅粉紫 */
            --primary: #FF6B8B;
            --accent: #7B2CBF;
            --bg-color: #F8F7FA;
            --card-glass: rgba(255, 255, 255, 0.85);
            --text-main: #3D2C38;
            --border-color: #E6E0E9;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* 頁首裝飾 */
        header {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 40%, #A1C4FD 100%);
            padding: 80px 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header h1 { font-family: 'Cinzel', serif; font-size: 2.8rem; margin: 0; letter-spacing: 4px; }
        header p { margin-top: 15px; font-weight: 300; letter-spacing: 2px; }

        .container { max-width: 1000px; margin: -50px auto 50px; padding: 20px; display: grid; gap: 30px; grid-template-columns: 1fr; }
        @media (min-width: 900px) { .container { grid-template-columns: 1.2fr 0.8fr; } }

        /* 區塊樣式 */
        .panel { 
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        /* 款式卡片 */
        .style-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .style-card {
            border: 2px solid var(--border-color);
            border-radius: 20px; padding: 20px; text-align: center; cursor: pointer;
            transition: var(--transition); background: white;
        }
        .style-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .style-card.selected { border-color: var(--accent); background: #FAF5FF; }
        .style-name { font-weight: 700; margin-bottom: 8px; }
        .style-price { color: var(--primary); font-weight: bold; }

        /* 加選項目 (優化為 Toggle 按鈕感) */
        .addon-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .addon-item {
            position: relative;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: var(--transition);
        }
        .addon-item:hover { background: #fdfafb; border-color: var(--primary); }
        .addon-item.active { border-color: var(--accent); background: #f9f4ff; }
        input[type="checkbox"] { display: none; }

        /* 表單與其他 */
        .form-control { width: 100%; padding: 15px; border: 1px solid var(--border-color); border-radius: 12px; margin-top: 5px; box-sizing: border-box; }
        .btn-submit { 
            width: 100%; padding: 18px; background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: var(--transition); margin-top: 20px;
        }
        .btn-submit:hover { opacity: 0.9; transform: scale(0.98); }
    </style>
</head>
<body>

    <header>
        <h1>Beautiful Moment.</h1>
        <p>✦ 凝膠美甲預約系統 ✦</p>
    </header>

    <main class="container">
        <div class="panel">
            <h2>✨ 步驟一：選擇款式</h2>
            <div class="style-grid" id="styleGrid"></div>
            
            <h2 style="margin-top: 40px;">✨ 步驟二：加選服務</h2>
            <div class="addon-list" id="addonsList"></div>
        </div>

        <div class="panel">
            <h2>✨ 步驟三：預約資料</h2>
            <form id="bookingForm">
                <input type="text" id="clientName" class="form-control" placeholder="顧客姓名" required>
                <input type="tel" id="clientPhone" class="form-control" placeholder="聯絡電話" required style="margin-top:15px;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <input type="date" id="bookingDate" class="form-control" required>
                    <select id="bookingTime" class="form-control" required><option value="">選擇時段</option></select>
                </div>
                <textarea id="notes" class="form-control" placeholder="備註需求..." style="margin-top:15px;"></textarea>
                
                <div id="priceSummary" style="margin-top:25px; padding:20px; background:#f4f4f4; border-radius:15px; font-weight:bold;">
                    總金額：<span id="summaryTotalPrice">$0</span>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">送出預約</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase 配置 (請保持你的原始 Key)
        const firebaseConfig = { /* ... 你的 Firebase 配置物件 ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 初始化資料
        const nailStyles = [
            { id: 's1', name: '極簡單色', price: 900 },
            { id: 's2', name: '氣質漸層', price: 1300 },
            { id: 's3', name: '復古貓眼', price: 1600 }
        ];

        // 渲染邏輯
        const styleGrid = document.getElementById('styleGrid');
        let selectedStyle = null;

        nailStyles.forEach(s => {
            const el = document.createElement('div');
            el.className = 'style-card';
            el.innerHTML = `<div class="style-name">${s.name}</div><div class="style-price">$${s.price}</div>`;
            el.onclick = () => {
                document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
                el.classList.add('selected');
                selectedStyle = s;
                updatePrice();
            };
            styleGrid.appendChild(el);
        });

        // 監聽價格計算
        function updatePrice() {
            let total = selectedStyle ? selectedStyle.price : 0;
            document.getElementById('summaryTotalPrice').innerText = `$${total}`;
        }

        // 送出表單
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!selectedStyle) return alert('請選擇款式');
            
            // 此處加入你的 Firebase addDoc 邏輯
            alert('預約已送出！');
        };
    </script>
</body>
</html>
