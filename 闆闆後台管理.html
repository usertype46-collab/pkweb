<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神の指藝 | 闆闆專屬預約管理後台</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F8F9FA;
            --text-dark: #2B2D42;
            --accent-purple: #6C5CE7;
            --danger-red: #D63031;
            --danger-bg: #FFF5F5;
            --shadow: 0 8px 24px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
            --new-client-pink: #FF477E; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 30px 20px;
        }

        .dashboard-header {
            max-width: 1400px; /* 稍微放寬以容納新欄位 */
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #3D2C38 0%, #241922 100%);
            padding: 25px 35px;
            border-radius: 16px;
            color: white;
            box-shadow: var(--shadow);
        }

        .dashboard-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .dashboard-header p {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .btn-refresh {
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-refresh:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* --- 滑入式彈出提示視窗樣式 --- */
        .toast-notification {
            position: fixed;
            top: 25px;
            right: 25px;
            background: #FFFFFF;
            border-left: 6px solid var(--accent-purple);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 20px;
            z-index: 2000;
            display: none; 
            flex-direction: column;
            gap: 12px;
            max-width: 380px;
            width: 90%;
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: var(--text-dark);
            font-size: 1.05rem;
        }

        .toast-body {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }

        .toast-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-toast-update, .btn-toast-close {
            border: none;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-toast-update { background-color: var(--accent-purple); color: white; }
        .btn-toast-close { background-color: #EBEAEF; color: #4A4E69; }
        .btn-toast-update:hover { opacity: 0.9; }
        .btn-toast-close:hover { background-color: #D6D5DB; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 20px;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .loading-status {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #888;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
            min-width: 1250px;
        }

        th {
            background-color: #F1EFF5;
            color: #4A4E69;
            padding: 15px;
            font-weight: 700;
            border-bottom: 2px solid #E2E0E7;
            white-space: nowrap;
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid #EBEAEF;
            vertical-align: middle;
        }

        tr:hover { background-color: #FAF9FC; }

        .datetime-badge { display: inline-flex; flex-direction: column; gap: 4px; }
        .date-item { font-weight: 700; color: #333; display: flex; align-items: center; gap: 6px; }
        .time-item { display: inline-block; background-color: #E0E1DD; padding: 2px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; width: fit-content; }

        .client-name { font-weight: 700; color: var(--accent-purple); font-size: 1.05rem; }
        .client-name.new-guest { color: var(--new-client-pink) !important; font-weight: 800; background-color: #FFF0F3; padding: 4px 10px; border-radius: 6px; display: inline-block; border: 1px solid #FFCCD5; }

        .addon-tag { display: inline-block; background-color: #F0E6FF; color: #5A32A3; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; margin: 2px; font-weight: 500; }
        .total-price { font-weight: 700; color: #2196F3; display: flex; flex-direction: column; gap: 2px; }
        .price-detail-sub { font-size: 0.75rem; color: #999; font-weight: 500; }
        .price-discount-tag { color: var(--new-client-pink); font-size: 0.75rem; font-weight: 700; }
        .notes-text { font-size: 0.85rem; color: #666; max-width: 200px; word-break: break-all; }

        /* 重疊警示 */
        tr.overlap-row { background-color: var(--danger-bg) !important; color: var(--danger-red) !important; }
        tr.overlap-row .client-name:not(.new-guest), tr.overlap-row .total-price, tr.overlap-row .date-item { color: var(--danger-red) !important; }
        tr.overlap-row .time-item { background-color: #FFD2D2 !important; color: var(--danger-red) !important; }
        .overlap-warning { display: block; color: white; background-color: var(--danger-red); font-size: 0.75rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 5px; text-align: center; width: fit-content; }

        /* 按鈕群組 */
        .action-btns {
            display: flex;
            gap: 8px;
            flex-direction: column;
        }

        .btn-view-img {
            background-color: #E8F0FE;
            color: #1967D2;
            border: 1px solid #D2E3FC;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-view-img:hover { background-color: #1967D2; color: white; }

        .btn-delete-row {
            background-color: white;
            color: var(--danger-red);
            border: 1px solid #FAD2CF;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-delete-row:hover { background-color: var(--danger-red); color: white; border-color: var(--danger-red); }

        /* --- 彈窗 Modal 共用與專屬樣式 --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(43, 45, 66, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: #FFFFFF;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
            position: relative;
        }

        /* 圖片預覽彈窗調整（讓它寬一點以看清合約） */
        .img-modal-content {
            max-width: 600px !important;
            padding: 30px;
        }

        .preview-img-container {
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
            border: 2px dashed #E2E0E7;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #FAFAFC;
        }

        .preview-img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .modal-content h3 { color: var(--danger-red); font-size: 1.4rem; margin-bottom: 10px; }
        .img-modal-content h3 { color: var(--accent-purple); }

        .modal-actions { display: flex; gap: 15px; justify-content: center; }
        
        .btn-modal { padding: 10px 24px; font-size: 1rem; font-weight: 700; border-radius: 8px; cursor: pointer; border: none; transition: var(--transition); }
        .btn-cancel { background-color: #EBEAEF; color: #4A4E69; }
        .btn-cancel:hover { background-color: #D6D5DB; }
        .btn-confirm-delete { background-color: var(--danger-red); color: white; box-shadow: 0 4px 12px rgba(214, 48, 49, 0.2); }
        .btn-confirm-delete:hover { background-color: #B92021; transform: translateY(-1px); }
        .btn-download-img { background-color: var(--accent-purple); color: white; box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2); }
        .btn-download-img:hover { background-color: #5A49C9; transform: translateY(-1px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <div>
            <h1>神の指藝 預約後台管理系統</h1>
            <p>專屬闆闆的即時顧客清單（依照預約日期時間排序）</p>
        </div>
        <button class="btn-refresh" id="refreshBtn">整理/重整資料</button>
    </div>

    <div id="toastAlert" class="toast-notification">
        <div class="toast-header">🔔 系統即時通知</div>
        <div class="toast-body">偵測到雲端資料庫有全新的客戶預約進來囉！請更新頁面以載入最新清單。</div>
        <div class="toast-actions">
            <button class="btn-toast-close" id="closeToastBtn">暫時關閉</button>
            <button class="btn-toast-update" id="updateToastBtn">立即更新</button>
        </div>
    </div>

    <div class="container">
        <div id="loading" class="loading-status">正在連線雲端資料庫並載入清單...</div>
        
        <div class="table-responsive">
            <table id="bookingTable" style="display: none;">
                <thead>
                    <tr>
                        <th>預約時段</th>
                        <th>顧客名稱</th>
                        <th>聯絡電話</th>
                        <th>選擇核心款式</th>
                        <th>附加服務項目</th>
                        <th>實收總額</th>
                        <th>保固與簽名</th> <th>客戶備註需求</th>
                        <th>操作管理</th>
                    </tr>
                </thead>
                <tbody id="bookingListTbody">
                </tbody>
            </table>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">⚠️</div>
            <h3>確定要刪除這筆預約嗎？</h3>
            <p>注意：刪除後資料將無法復原！<br>請確認客戶已完成服務或是確定取消預約。</p>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" id="cancelDeleteBtn">取消保留</button>
                <button class="btn-modal btn-confirm-delete" id="confirmDeleteBtn">確認刪除</button>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal-overlay">
        <div class="modal-content img-modal-content">
            <h3>📑 顧客保固與簽名紀錄</h3>
            <div class="preview-img-container">
                <img id="previewImage" src="" alt="保固合約與簽名截圖">
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" id="closeImgModalBtn">關閉視窗</button>
                <button class="btn-modal btn-download-img" id="downloadImgBtn">📥 下載存檔</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ===================================================
        // FIREBASE 配置設定
        // ===================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAvLmHzZK6HwMLJFo3JyzY_T_azpElk1Lc",
            authDomain: "beautiful-68dbc.firebaseapp.com",
            databaseURL: "https://beautiful-68dbc-default-rtdb.firebaseio.com",
            projectId: "beautiful-68dbc",
            storageBucket: "beautiful-68dbc.firebasestorage.app",
            messagingSenderId: "348466975949",
            appId: "1:348466975949:web:44eb81d962fe957fa34584",
            measurementId: "G-3V4FDPJCQ0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 全域變數 ---
        let targetDeleteId = null;
        const screenshotsMap = new Map(); // 用來暫存 Base64 截圖，避免把龐大字串塞在 HTML 標籤裡
        let currentViewingImgData = null;
        let currentViewingClientName = '';

        // --- DOM 元素抓取 ---
        const deleteModal = document.getElementById('deleteModal');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        
        const imageModal = document.getElementById('imageModal');
        const closeImgModalBtn = document.getElementById('closeImgModalBtn');
        const downloadImgBtn = document.getElementById('downloadImgBtn');
        const previewImage = document.getElementById('previewImage');

        const toastAlert = document.getElementById('toastAlert');
        const closeToastBtn = document.getElementById('closeToastBtn');
        const updateToastBtn = document.getElementById('updateToastBtn');

        // --- 提醒吐司控制 ---
        closeToastBtn.addEventListener('click', () => toastAlert.style.display = 'none');
        updateToastBtn.addEventListener('click', () => {
            toastAlert.style.display = 'none';
            loadBookings();
        });

        // --- 刪除控制邏輯 ---
        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.style.display = 'none';
            targetDeleteId = null;
        });

        confirmDeleteBtn.addEventListener('click', async () => {
            if (!targetDeleteId) return;
            try {
                confirmDeleteBtn.innerText = "刪除中...";
                confirmDeleteBtn.disabled = true;
                await deleteDoc(doc(db, "nail_bookings", targetDeleteId));
                deleteModal.style.display = 'none';
                await loadBookings();
            } catch (error) {
                console.error("刪除失敗: ", error);
                alert("刪除失敗，請檢查網路連線或權限設定！");
            } finally {
                confirmDeleteBtn.innerText = "確認刪除";
                confirmDeleteBtn.disabled = false;
                targetDeleteId = null;
            }
        });

        // --- 圖片預覽與下載控制邏輯 ---
        closeImgModalBtn.addEventListener('click', () => {
            imageModal.style.display = 'none';
            previewImage.src = '';
            currentViewingImgData = null;
            currentViewingClientName = '';
        });

        // 監聽表格內的點擊事件 (Event Delegation)，抓取按鈕點擊
        document.getElementById('bookingListTbody').addEventListener('click', (e) => {
            // 處理預覽截圖按鈕
            if (e.target.classList.contains('btn-view-img')) {
                const id = e.target.getAttribute('data-id');
                const rawName = e.target.getAttribute('data-name');
                
                // 清理名稱中的標籤，供下載檔名使用
                currentViewingClientName = rawName ? rawName.replace(/〔初〕/g, '').trim() : '客戶';
                currentViewingImgData = screenshotsMap.get(id);

                if (currentViewingImgData) {
                    previewImage.src = currentViewingImgData;
                    imageModal.style.display = 'flex';
                }
            }

            // 處理刪除按鈕
            if (e.target.classList.contains('btn-delete-row')) {
                targetDeleteId = e.target.getAttribute('data-id');
                deleteModal.style.display = 'flex';
            }
        });

        // 圖片下載功能
        downloadImgBtn.addEventListener('click', () => {
            if (!currentViewingImgData) return;
            
            // 建立虛擬超連結來觸發下載
            const link = document.createElement('a');
            link.href = currentViewingImgData;
            link.download = `${currentViewingClientName}_保固簽名紀錄.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // --- 音效提示 ---
        function playNotificationChime() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(659.25, now);
                gain1.gain.setValueAtTime(0.2, now); gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc1.connect(gain1); gain1.connect(ctx.destination);
                osc1.start(now); osc1.stop(now + 0.3);

                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine'; osc2.frequency.setValueAtTime(880.00, now + 0.1);
                gain2.gain.setValueAtTime(0.2, now + 0.1); gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc2.connect(gain2); gain2.connect(ctx.destination);
                osc2.start(now + 0.1); osc2.stop(now + 0.5);
            } catch (e) {
                console.warn("瀏覽器尚未授權音效播放: ", e);
            }
        }

        // --- 核心資料載入與渲染 ---
        async function loadBookings() {
            const tbody = document.getElementById('bookingListTbody');
            const loading = document.getElementById('loading');
            const table = document.getElementById('bookingTable');
            
            toastAlert.style.display = 'none'; 
            loading.style.display = 'block';
            table.style.display = 'none';
            tbody.innerHTML = '';
            screenshotsMap.clear(); // 清空舊的圖片暫存

            try {
                const querySnapshot = await getDocs(collection(db, "nail_bookings"));
                let rawList = [];
                
                querySnapshot.forEach((doc) => {
                    rawList.push({ id: doc.id, ...doc.data() });
                });

                rawList.sort((a, b) => {
                    if (a.bookingDate !== b.bookingDate) return a.bookingDate.localeCompare(b.bookingDate);
                    return a.bookingTime.localeCompare(b.bookingTime);
                });

                const timeCounts = {};
                rawList.forEach(item => {
                    const key = `${item.bookingDate}_${item.bookingTime}`;
                    timeCounts[key] = (timeCounts[key] || 0) + 1;
                    
                    // 將有截圖的資料存入 Map 備用
                    if (item.warrantyScreenshot) {
                        screenshotsMap.set(item.id, item.warrantyScreenshot);
                    }
                });

                if(rawList.length === 0) {
                    loading.innerText = "目前雲端尚無預約客戶預約資料。";
                    return;
                }

                rawList.forEach(item => {
                    const tr = document.createElement('tr');
                    const key = `${item.bookingDate}_${item.bookingTime}`;
                    const isOverlap = timeCounts[key] > 1;
                    
                    if (isOverlap) tr.className = 'overlap-row'; 

                    // 附加項目
                    let addonsHTML = '';
                    if (item.selectedAddons && item.selectedAddons.length > 0) {
                        item.selectedAddons.forEach((addon, index) => {
                            addonsHTML += `<span class="addon-tag">${index + 1}. ${addon}</span>`;
                        });
                    } else {
                        addonsHTML = '<span style="color:#aaa; font-size:0.85rem;">無</span>';
                    }

                    // 顧客名稱處理 (初次判斷)
                    const isNewGuest = item.isFirstTime === true || (item.clientName && item.clientName.includes('〔初〕'));
                    let nameHTML = '';
                    if (isNewGuest) {
                        let cleanName = item.clientName ? item.clientName.replace('〔初〕', '') : '未填';
                        nameHTML = `<span class="client-name new-guest">〔初〕${cleanName}</span>`;
                    } else {
                        nameHTML = `<span class="client-name">${item.clientName || '未填'}</span>`;
                    }

                    // 價格運算與顯示
                    let priceHTML = '';
                    if (item.priceCalculations) {
                        const total = item.priceCalculations.totalPrice.toLocaleString();
                        const base = item.priceCalculations.basePrice;
                        const addon = item.priceCalculations.addonPrice;
                        const discount = item.priceCalculations.discountPrice || 0;

                        if (isNewGuest && discount > 0) {
                            const originalSum = base + addon;
                            priceHTML = `
                                <span class="total-price">$${total}
                                    <span class="price-discount-tag">現折 95 折 (-$${discount.toLocaleString()})</span>
                                    <span class="price-detail-sub">原價: $${originalSum.toLocaleString()}</span>
                                </span>`;
                        } else {
                            priceHTML = `<span class="total-price">$${total}</span>`;
                        }
                    } else {
                        priceHTML = `<span class="total-price">$0</span>`;
                    }

                    // 截圖查看按鈕 HTML (若該筆資料有截圖，則產生按鈕)
                    let screenshotHTML = '';
                    if (item.warrantyScreenshot) {
                        screenshotHTML = `<button class="btn-view-img" data-id="${item.id}" data-name="${item.clientName || '客戶'}">👁️ 查看紀錄</button>`;
                    } else {
                        screenshotHTML = `<span style="color:#aaa; font-size:0.85rem;">無電子紀錄</span>`;
                    }

                    // 組裝該列資料
                    tr.innerHTML = `
                        <td>
                            <div class="datetime-badge">
                                <span class="date-item">📅 ${item.bookingDate}</span>
                                <span class="time-item">${item.bookingTime}</span>
                                ${isOverlap ? '<span class="overlap-warning">⚠️ 時段重複重疊！</span>' : ''}
                            </div>
                        </td>
                        <td>${nameHTML}</td>
                        <td><strong>${item.clientPhone || '未填'}</strong></td>
                        <td>${item.selectedStyle || '未選擇'}</td>
                        <td>${addonsHTML}</td>
                        <td>${priceHTML}</td>
                        <td style="text-align:center;">${screenshotHTML}</td> <td><div class="notes-text">${item.notes || '<span style="color:#ccc;">無備註</span>'}</div></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-delete-row" data-id="${item.id}">刪除</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                loading.style.display = 'none';
                table.style.display = 'table';

            } catch (error) {
                console.error("讀取後台失敗: ", error);
                loading.innerText = "讀取雲端資料失敗，請確認 Firebase 設定或權限規則。";
            }
        }

        // --- Firebase 即時監聽 ---
        let isFirstListeningLoad = true;
        onSnapshot(collection(db, "nail_bookings"), (snapshot) => {
            if (isFirstListeningLoad) {
                isFirstListeningLoad = false;
                return;
            }
            const hasNewBooking = snapshot.docChanges().some(change => change.type === "added");
            if (hasNewBooking) {
                toastAlert.style.display = 'flex';
                playNotificationChime();
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', loadBookings);
        loadBookings();
    </script>
</body>
</html>
