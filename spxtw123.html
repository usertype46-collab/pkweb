<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>鮮豔高對比 上架效率分析系統</title>
  <style>
    /* =========================
       鮮豔高對比主題變數
       ========================= */
    :root{
      --bg:#071028;
      --panel:#071833;
      --card:#071a2a;
      --muted:#9fb4d6;
      --accent-1:#00d4ff; /* 青藍 */
      --accent-2:#ff3d81; /* 桃紅 */
      --accent-3:#ffd400; /* 黃 */
      --accent-grad: linear-gradient(135deg,var(--accent-1),var(--accent-2));
      --glass: rgba(255,255,255,0.04);
      --glass-2: rgba(255,255,255,0.02);
      --border: rgba(255,255,255,0.08);
      --danger:#ff4d4f;
      --success:#2ee6a7;
      --radius:14px;
      --max-width:1200px;
      --text:#eaf6ff;
      --mono: "Inter", "Segoe UI", Roboto, "Noto Sans TC", system-ui, -apple-system, "Helvetica Neue", Arial;
    }

    html,body{
      height:100%;
      margin:0;
      font-family:var(--mono);
      background:
        radial-gradient(800px 400px at 10% 10%, rgba(0,212,255,0.06), transparent 8%),
        radial-gradient(700px 350px at 90% 90%, rgba(255,61,129,0.04), transparent 10%),
        var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:28px;
      box-sizing:border-box;
    }

    /* =========================
       佈局
       ========================= */
    .app {
      max-width:var(--max-width);
      margin:0 auto;
      display:grid;
      grid-template-columns:260px 1fr;
      gap:22px;
      align-items:start;
    }

    /* 側邊欄 */
    .sidebar{
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:var(--radius);
      padding:18px;
      border:1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      position:sticky;
      top:28px;
      height:calc(100vh - 56px);
      display:flex;
      flex-direction:column;
      gap:14px;
      overflow:auto;
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .logo{
      width:48px;
      height:48px;
      border-radius:12px;
      background: linear-gradient(135deg,var(--accent-1),var(--accent-2));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#021226;
      font-weight:900;
      font-size:18px;
      box-shadow: 0 10px 30px rgba(0,212,255,0.12), inset 0 -6px 18px rgba(255,61,129,0.06);
    }
    .brand h3{ margin:0; font-size:16px; letter-spacing:0.2px; color:var(--text); }
    .brand p{ margin:0; font-size:12px; color:var(--muted); }

    .menu { display:flex; flex-direction:column; gap:10px; margin-top:8px; }

    .menu-btn{
      display:flex;
      gap:12px;
      align-items:center;
      padding:12px;
      border-radius:12px;
      cursor:pointer;
      transition: all 180ms cubic-bezier(.2,.9,.2,1);
      background: linear-gradient(90deg, rgba(255,255,255,0.01), transparent);
      border:1px solid transparent;
      color:var(--text);
      font-weight:700;
      font-size:14px;
    }
    .menu-btn svg{ width:18px; height:18px; opacity:0.98; }
    .menu-btn .label{ flex:1; text-align:left; }
    .menu-btn .sub{ font-size:12px; color:var(--muted); }

    .menu-btn:hover{
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
      border-color: rgba(0,212,255,0.12);
    }
    .menu-btn.active{
      background: linear-gradient(90deg, rgba(0,212,255,0.12), rgba(255,61,129,0.08));
      border:1px solid rgba(0,212,255,0.18);
      box-shadow: 0 12px 40px rgba(0,212,255,0.08);
    }

    .badge{
      background: linear-gradient(90deg,#ffd400,#ff3d81);
      color:#021226;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      font-weight:800;
    }

    .utilities{ margin-top:auto; display:flex; gap:10px; align-items:center; justify-content:space-between; }

    .toggle{ display:flex; gap:8px; align-items:center; background:var(--glass-2); padding:8px; border-radius:10px; border:1px solid var(--border); }
    .toggle button{ background:transparent; border:0; color:var(--muted); cursor:pointer; padding:6px 8px; border-radius:8px; font-weight:700; }
    .toggle button.active{ background:var(--accent-1); color:#021226; box-shadow: 0 8px 30px rgba(0,212,255,0.12); }

    /* 主內容 */
    .main{
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:var(--radius);
      padding:22px;
      border:1px solid var(--border);
      box-shadow: 0 18px 50px rgba(0,0,0,0.6);
      min-height:70vh;
    }

    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
    .title h2{ margin:0; font-size:20px; letter-spacing:0.2px; color:var(--text); }
    .title p{ margin:0; color:var(--muted); font-size:13px; }

    .actions{ display:flex; gap:10px; align-items:center; }

    .btn{
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:10px 14px;
      border-radius:12px;
      background: linear-gradient(90deg,var(--accent-1),var(--accent-2));
      color:#021226;
      font-weight:900;
      border:0;
      cursor:pointer;
      box-shadow: 0 14px 40px rgba(0,212,255,0.12);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }
    .btn:active{ transform: translateY(1px) scale(0.998); }

    /* 浮動按鈕 */
    .fab{
      position:fixed;
      right:28px;
      bottom:28px;
      width:64px;
      height:64px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg,var(--accent-2),var(--accent-1));
      color:#021226;
      box-shadow: 0 22px 60px rgba(255,61,129,0.14);
      cursor:pointer;
      z-index:60;
      border:1px solid rgba(255,255,255,0.06);
      transition: transform 140ms ease;
    }
    .fab:active{ transform: scale(0.98); }

    /* 表格 */
    table{ width:100%; border-collapse:separate; border-spacing:0; margin-top:8px; border-radius:10px; overflow:hidden; background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent); border:1px solid var(--border); }
    thead th{ background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); color:var(--muted); font-weight:900; padding:14px; font-size:13px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.03); }
    tbody td{ padding:12px; text-align:center; border-bottom:1px dashed rgba(255,255,255,0.02); font-size:14px; color:var(--text); }

    input[type="time"], input[type="number"]{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      color:var(--text);
      text-align:center;
      font-weight:700;
      font-size:14px;
      transition: box-shadow 140ms, border-color 140ms;
    }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1) hue-rotate(180deg) saturate(1.6); opacity:0.95; }
    input[type="time"]:focus, input[type="number"]:focus{ outline:none; box-shadow: 0 10px 30px rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.22); }

    .note-box{
      background: linear-gradient(90deg, rgba(0,212,255,0.06), rgba(255,61,129,0.04));
      padding:12px 14px;
      border-radius:12px;
      color:var(--text);
      border:1px solid rgba(255,255,255,0.03);
      display:flex;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }
    .note-box strong{ display:block; font-weight:900; color:#021226; background: linear-gradient(90deg,#ffd400,#ff3d81); padding:4px 8px; border-radius:8px; color:#021226; }

    .total-row{ background: linear-gradient(90deg, rgba(255,255,255,0.01), rgba(255,255,255,0.01)); font-weight:900; color:var(--text); }

    .bg-red{
      background: linear-gradient(90deg, rgba(255,77,79,0.14), rgba(255,77,79,0.06));
      color:var(--danger);
      font-weight:900;
      border-radius:8px;
      padding:6px 8px;
      display:inline-block;
    }

    /* 漣漪 */
    .ripple{ position:absolute; border-radius:50%; transform:scale(0); animation:ripple 600ms linear; background: rgba(255,255,255,0.12); pointer-events:none; }
    @keyframes ripple{ to{ transform:scale(6); opacity:0; } }

    /* 響應式 */
    @media (max-width:980px){
      .app{ grid-template-columns:1fr; padding-bottom:120px; }
      .sidebar{ position:relative; height:auto; order:2; }
      .fab{ right:18px; bottom:18px; }
    }

    /* 小工具 */
    .muted{ color:var(--muted); font-size:13px; }
    .pill{ padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.02); font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <!-- SIDEBAR -->
    <aside class="sidebar" aria-label="側邊選單">
      <div class="brand">
        <div class="logo">上</div>
        <div>
          <h3>上架效率系統</h3>
          <p class="muted">鮮豔高對比 • 即時分析</p>
        </div>
      </div>

      <div class="menu" role="menu" aria-label="主選單">
        <div class="menu-btn active" data-key="dashboard" tabindex="0">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 13h8V3H3v10zM3 21h8v-6H3v6zM13 21h8V11h-8v10zM13 3v6h8V3h-8z"/></svg>
          <div class="label">儀表板</div>
          <div class="sub pill">即時</div>
        </div>

        <div class="menu-btn" data-key="analysis" tabindex="0">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 3v18h18" stroke="currentColor" stroke-width="0"/></svg>
          <div class="label">效率分析</div>
          <div class="sub muted">歷史</div>
        </div>

        <div class="menu-btn" data-key="settings" tabindex="0">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"/></svg>
          <div class="label">系統設定</div>
        </div>

        <div class="menu-btn" data-key="help" tabindex="0">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/></svg>
          <div class="label">說明</div>
        </div>
      </div>

      <div class="utilities">
        <div class="toggle" role="toolbar" aria-label="主題切換">
          <button id="themeLight" title="淺色主題">☀️</button>
          <button id="themeDark" class="active" title="深色主題">🌙</button>
        </div>
        <div class="pill muted">帳號：管理者</div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="mainCard">
      <div class="topbar">
        <div class="title">
          <h2>🚀 上架效率分析系統 v2.1</h2>
          <p class="muted">鮮豔高對比 • 即時計算與警示</p>
        </div>

        <div class="actions">
          <button class="btn" id="resetBtn" title="重置表單">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 10v6h-6" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 14a9 9 0 1 0 3-6.7L3 8" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            重置
          </button>
        </div>
      </div>

      <div class="note-box" role="note">
        <div style="font-size:20px;line-height:1;">💡</div>
        <div>
          <strong>操作指南</strong>
          <ul>
            <li>輸入開始與結束時間（HH:MM:SS）及包裹總數，系統自動即時計算。</li>
            <li>系統預設扣除 <strong>120 秒</strong>作業緩衝時間。</li>
            <li>當平均時間超過 <strong>15.6 秒/顆</strong>，系統將自動標記紅色警示。</li>
          </ul>
        </div>
      </div>

      <div style="overflow:auto;">
        <table aria-describedby="tableDesc">
          <thead>
            <tr>
              <th>分類</th><th>開始時間</th><th>結束時間</th><th>包裹顆數</th><th>總秒數</th><th>緩衝後(秒)</th><th>無緩衝均速</th><th>緩衝後均速</th>
            </tr>
          </thead>
          <tbody id="data-body">
            <!-- JS 產生列 -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" aria-label="新增紀錄" title="新增紀錄">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#021226" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <script>
    /* 初始化表格 */
    const tbody = document.getElementById('data-body');
    for(let i=1;i<=5;i++){
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><b style="color:var(--accent-3)">${i}上</b></td>
        <td><input type="time" step="1" id="start-${i}" onchange="calculateRow(${i})" aria-label="開始時間 ${i}"></td>
        <td><input type="time" step="1" id="end-${i}" onchange="calculateRow(${i})" aria-label="結束時間 ${i}"></td>
        <td><input type="number" id="count-${i}" oninput="calculateRow(${i})" placeholder="0" min="0" aria-label="包裹顆數 ${i}"></td>
        <td id="total-sec-${i}">0</td>
        <td id="buffer-sec-${i}">0</td>
        <td id="avg-${i}">0.00</td>
        <td id="avg-buf-${i}">0.00</td>
      `;
      tbody.appendChild(tr);
    }

    const totalRow = document.createElement('tr');
    totalRow.className = 'total-row';
    totalRow.innerHTML = `<td>總計</td><td>-</td><td>-</td><td id="grand-count">0</td><td id="grand-total-sec">0</td><td id="grand-buffer-sec">0</td><td id="grand-avg">0.00</td><td>-</td>`;
    tbody.appendChild(totalRow);

    /* 時間轉秒 */
    function timeToSeconds(timeStr){
      if(!timeStr) return null;
      const parts = timeStr.split(':').map(Number);
      const [h=0,m=0,s=0] = parts;
      return h*3600 + m*60 + s;
    }

    /* 計算單列 */
    function calculateRow(rowNum){
      const startVal = document.getElementById(`start-${rowNum}`).value;
      const endVal = document.getElementById(`end-${rowNum}`).value;
      const count = parseFloat(document.getElementById(`count-${rowNum}`).value) || 0;

      const start = timeToSeconds(startVal);
      const end = timeToSeconds(endVal);

      if(start !== null && end !== null){
        let total = (end < start) ? (end + 86400 - start) : (end - start);
        let buffer = Math.max(0, total - 120);

        document.getElementById(`total-sec-${rowNum}`).innerText = total;
        document.getElementById(`buffer-sec-${rowNum}`).innerText = buffer;

        if(count > 0){
          const avg = total / count;
          const avgBuf = buffer / count;
          const avgEl = document.getElementById(`avg-${rowNum}`);
          const avgBufEl = document.getElementById(`avg-buf-${rowNum}`);

          avgEl.innerText = avg.toFixed(2);
          avgBufEl.innerText = avgBuf.toFixed(2);

          avg > 15.6 ? avgEl.classList.add('bg-red') : avgEl.classList.remove('bg-red');
          avgBuf > 15.6 ? avgBufEl.classList.add('bg-red') : avgBufEl.classList.remove('bg-red');
        }
      }
      calculateGrandTotal();
    }

    /* 計算總計 */
    function calculateGrandTotal(){
      let gCount = 0, gTotal = 0, gBuf = 0;
      for(let i=1;i<=5;i++){
        gCount += parseFloat(document.getElementById(`count-${i}`).value) || 0;
        gTotal += parseInt(document.getElementById(`total-sec-${i}`).innerText) || 0;
        gBuf += parseInt(document.getElementById(`buffer-sec-${i}`).innerText) || 0;
      }
      document.getElementById('grand-count').innerText = gCount;
      document.getElementById('grand-total-sec').innerText = gTotal;
      document.getElementById('grand-buffer-sec').innerText = gBuf;

      const gAvg = gCount > 0 ? (gTotal / gCount) : 0;
      const gAvgEl = document.getElementById('grand-avg');
      gAvgEl.innerText = gAvg.toFixed(2);
      gAvg > 15.6 ? gAvgEl.classList.add('bg-red') : gAvgEl.classList.remove('bg-red');
    }

    /* Reset */
    document.getElementById('resetBtn').addEventListener('click', ()=>{
      for(let i=1;i<=5;i++){
        document.getElementById(`start-${i}`).value = '';
        document.getElementById(`end-${i}`).value = '';
        document.getElementById(`count-${i}`).value = '';
        document.getElementById(`total-sec-${i}`).innerText = '0';
        document.getElementById(`buffer-sec-${i}`).innerText = '0';
        document.getElementById(`avg-${i}`).innerText = '0.00';
        document.getElementById(`avg-buf-${i}`).innerText = '0.00';
        document.getElementById(`avg-${i}`).classList.remove('bg-red');
        document.getElementById(`avg-buf-${i}`).classList.remove('bg-red');
      }
      calculateGrandTotal();
    });

    /* FAB 新增示範 */
    document.getElementById('fab').addEventListener('click', (e)=>{
      createRipple(e.currentTarget, e);
      for(let i=1;i<=5;i++){
        const cnt = document.getElementById(`count-${i}`).value;
        if(!cnt){
          const now = new Date();
          const start = new Date(now.getTime() - (Math.floor(Math.random()*1800)+300)*1000);
          const fmt = d => d.toTimeString().split(' ')[0];
          document.getElementById(`start-${i}`).value = fmt(start);
          document.getElementById(`end-${i}`).value = fmt(now);
          document.getElementById(`count-${i}`).value = Math.floor(Math.random()*30)+1;
          calculateRow(i);
          break;
        }
      }
    });

    /* 側邊選單互動與漣漪 */
    document.querySelectorAll('.menu-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        createRipple(btn, e);
        document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const key = btn.getAttribute('data-key');
        const title = document.querySelector('.title h2');
        title.innerText = (key === 'dashboard') ? '🚀 上架效率分析系統 v2.1' : `🔎 ${btn.querySelector('.label').innerText} • 功能示範`;
      });
      btn.addEventListener('keydown', (ev)=>{
        if(ev.key === 'Enter' || ev.key === ' '){
          ev.preventDefault();
          btn.click();
        }
      });
    });

    /* 主題切換（簡單示範） */
    const root = document.documentElement;
    const themeLight = document.getElementById('themeLight');
    const themeDark = document.getElementById('themeDark');
    function setTheme(theme){
      if(theme === 'light'){
        root.style.setProperty('--bg','#f6fbff');
        root.style.setProperty('--text','#021226');
        root.style.setProperty('--muted','#4b5563');
        themeLight.classList.add('active');
        themeDark.classList.remove('active');
      } else {
        root.style.removeProperty('--bg');
        root.style.removeProperty('--text');
        root.style.removeProperty('--muted');
        themeDark.classList.add('active');
        themeLight.classList.remove('active');
      }
    }
    themeLight.addEventListener('click', ()=> setTheme('light'));
    themeDark.addEventListener('click', ()=> setTheme('dark'));

    /* 漣漪效果 */
    function createRipple(el, event){
      const rect = el.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height) * 1.2;
      ripple.style.width = ripple.style.height = size + 'px';
      const x = (event.clientX || (rect.left + rect.width/2)) - rect.left - size/2;
      const y = (event.clientY || (rect.top + rect.height/2)) - rect.top - size/2;
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      el.appendChild(ripple);
      setTimeout(()=> ripple.remove(), 650);
    }

    /* 初始計算 */
    calculateGrandTotal();

    /* 快捷鍵 */
    window.addEventListener('keydown', (e)=>{
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n'){
        document.getElementById('fab').click();
      }
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'r'){
        document.getElementById('resetBtn').click();
      }
    });

    /* 無障礙 focus 樣式 */
    document.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('focus', ()=> inp.style.boxShadow = '0 12px 40px rgba(0,212,255,0.12)');
      inp.addEventListener('blur', ()=> inp.style.boxShadow = 'none');
    });
  </script>
</body>
</html>
