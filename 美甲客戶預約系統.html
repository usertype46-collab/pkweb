<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業美甲藝術設計預約系統 | Nail Art Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全局樣式與變數變更 --- */
        :root {
            --primary-color: #C8A2C8; /* 浪漫薰衣草/玫瑰粉 */
            --accent-color: #B8860B;  /* 奢華金 */
            --bg-color: #FDFBF9;      /* 奶油輕奢白 */
            --text-color: #4A3E3D;    /* 深可可色 */
            --card-bg: #FFFFFF;
            --shadow: 0 10px 30px rgba(184, 134, 11, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* --- 頁首設計 --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #FFF5F5 0%, #F5E6E8 100%);
            border-bottom: 1px solid rgba(184, 134, 11, 0.15);
        }

        header h1 {
            font-family: 'Cinzel', 'Noto Sans TC', serif;
            font-size: 2.2rem;
            color: #3A2E2B;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            color: #8C7572;
            font-weight: 300;
        }

        /* --- 主要佈局 --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #E8D7D0;
            color: #3A2E2B;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(232, 215, 208, 0.5);
        }

        /* --- 款式選擇區 (Grid Cards) --- */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .style-card {
            border: 2px solid #F0E6E4;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #FFF;
            position: relative;
        }

        .style-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(200, 162, 200, 0.2);
        }

        .style-card.selected {
            border-color: var(--accent-color);
            background-color: #FDF9F5;
        }

        .style-card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-color);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            line-height: 22px;
        }

        .style-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #3A2E2B;
        }

        .style-price {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* --- 加選項目 (Checkboxes) --- */
        .addons-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .addon-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: #FDFBF9;
            border: 1px solid #EFEAE6;
            border-radius: 8px;
            cursor: pointer;
        }

        .addon-item input {
            margin-right: 10px;
            accent-color: var(--accent-color);
        }

        /* --- 表單控制項 --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #DCD1CC;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-color);
            background-color: #FAFAFA;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #FFF;
            box-shadow: 0 0 0 3px rgba(200, 162, 200, 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* --- 價格計算面板 --- */
        .price-summary {
            background: linear-gradient(135deg, #3A2E2B 0%, #2A201E 100%);
            color: #FFF;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #D3C4BF;
        }

        .price-total {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #544542;
            font-size: 1.4rem;
            font-weight: 700;
            color: #E6C594;
        }

        /* --- 按鈕樣式 --- */
        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #D4AF37 0%, #B8860B 100%);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.3);
            transition: var(--transition);
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #CCC;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* --- 訊息提示 --- */
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            text-align: center;
        }
        .alert-success {
            background-color: #E6F4EA;
            color: #137333;
            border: 1px solid #C4EED0;
        }
        .alert-error {
            background-color: #FCE8E6;
            color: #C5221F;
            border: 1px solid #FAD2CF;
        }
    </style>
</head>
<body>

    <header>
        <h1>神の指藝Beautiful moment.</h1>
        <p>【客製凝膠美甲｜預約制美甲】</p>
    </header>

    <div class="container">
        <div class="section-panel">
            <h2><span>✦</span> 步驟一：選擇核心美甲款式</h2>
            <div class="style-grid" id="styleGrid">
                </div>

            <h2><span>✦</span> 步驟二：進階附加服務</h2>
            <div class="addons-list" id="addonsList">
                </div>
        </div>

        <div class="section-panel" style="height: fit-content;">
            <h2><span>✦</span> 步驟三：填寫申請資料</h2>
            
            <div class="alert alert-success" id="successAlert">系統預約申請成功！我們將會發送簡訊確認。</div>
            <div class="alert alert-error" id="errorAlert">請填寫所有必填欄位並選擇款式。</div>

            <form id="bookingForm">
                <div class="form-group">
                    <label for="clientName">顧客姓名 *</label>
                    <input type="text" id="clientName" class="form-control" placeholder="請輸入您的真實姓名" required>
                </div>

                <div class="form-group">
                    <label for="clientPhone">聯絡電話 *</label>
                    <input type="tel" id="clientPhone" class="form-control" placeholder="例如：0912345678" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bookingDate">預約日期 *</label>
                        <input type="date" id="bookingDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="bookingTime">預約時段 *</label>
                        <select id="bookingTime" class="form-control" required>
                            <option value="">請選擇時段</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="13:00">01:00 PM</option>
                            <option value="15:30">03:30 PM</option>
                            <option value="18:00">06:00 PM</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">備註與特殊設計需求描述</label>
                    <textarea id="notes" class="form-control" rows="3" placeholder="如有指定美甲師或需卸甲請備註於此..."></textarea>
                </div>

                <div class="price-summary">
                    <div class="price-row">
                        <span>基礎款式小計</span>
                        <span id="summaryStylePrice">$0</span>
                    </div>
                    <div class="price-row">
                        <span>附加服務小計</span>
                        <span id="summaryAddonPrice">$0</span>
                    </div>
                    <div class="price-total">
                        <span>預估總金額</span>
                        <span id="summaryTotalPrice">$0</span>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">送出預約申請</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 1. FIREBASE 雲端資料庫配置 (請在此填入您的金鑰)
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
            projectId: "YOUR_FIREBASE_PROJECT_ID",
            storageBucket: "YOUR_FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "YOUR_FIREBASE_MESSAGING_SENDER_ID",
            appId: "YOUR_FIREBASE_APP_ID"
        };

        // 初始化 Firebase 與 Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // 2. 系統核心數據定義
        // ==========================================
        const nailStyles = [
            { id: 'style_1', name: '經典極簡單色凝膠', price: 900 },
            { id: 'style_2', name: '法式優雅氣質漸層', price: 1300 },
            { id: 'style_3', name: '奢華復古貓眼晶石', price: 1600 },
            { id: 'style_4', name: '獨家日系手繪藝術', price: 2200 },
            { id: 'style_5', name: '暈染大理石奢華風', price: 2000 }
        ];

        const addonServices = [
            { id: 'addon_1', name: '本店溫和卸甲續作', price: 300 },
            { id: 'addon_2', name: '他店安全卸甲', price: 500 },
            { id: 'addon_3', name: '精細指緣深層保養', price: 400 },
            { id: 'addon_4', name: '施華洛世奇水鑽(單指)', price: 150 }
        ];

        // 狀態管理物件
        let currentSelection = {
            selectedStyle: null,
            selectedAddons: new Set()
        };

        // ==========================================
        // 3. UI 渲染引擎與事件綁定
        // ==========================================
        const styleGrid = document.getElementById('styleGrid');
        const addonsList = document.getElementById('addonsList');

        // 動態渲染美甲主款式
        nailStyles.forEach(style => {
            const card = document.createElement('div');
            card.className = 'style-card';
            card.dataset.id = style.id;
            card.innerHTML = `
                <div class="style-name">${style.name}</div>
                <div class="style-price">$${style.price.toLocaleString()}</div>
            `;
            card.addEventListener('click', () => selectStyle(style));
            styleGrid.appendChild(card);
        });

        // 動態渲染加選服務
        addonServices.forEach(addon => {
            const label = document.createElement('label');
            label.className = 'addon-item';
            label.innerHTML = `
                <div>
                    <input type="checkbox" value="${addon.id}" data-price="${addon.price}">
                    <span>${addon.name}</span>
                </div>
                <span style="color:#B8860B; font-weight:500;">+$${addon.price}</span>
            `;
            label.querySelector('input').addEventListener('change', (e) => toggleAddon(e, addon));
            addonsList.appendChild(label);
        });

        // ==========================================
        // 4. 計價核心控制運算邏輯
        // ==========================================
        function selectStyle(style) {
            // 清除之前的選取樣式
            document.querySelectorAll('.style-card').forEach(card => card.classList.remove('selected'));
            
            // 賦值新選取項
            currentSelection.selectedStyle = style;
            const selectedCard = document.querySelector(`.style-card[data-id="${style.id}"]`);
            if (selectedCard) selectedCard.classList.add('selected');

            calculateTotal();
        }

        function toggleAddon(e, addon) {
            if (e.target.checked) {
                currentSelection.selectedAddons.add(addon);
            } else {
                // 依據物件特性篩選移除
                currentSelection.selectedAddons.forEach(item => {
                    if(item.id === addon.id) currentSelection.selectedAddons.delete(item);
                });
            }
            calculateTotal();
        }

        function calculateTotal() {
            const stylePrice = currentSelection.selectedStyle ? currentSelection.selectedStyle.price : 0;
            let addonPrice = 0;
            currentSelection.selectedAddons.forEach(item => addonPrice += item.price);
            
            const total = stylePrice + addonPrice;

            // 更新預覽界面
            document.getElementById('summaryStylePrice').innerText = `$${stylePrice.toLocaleString()}`;
            document.getElementById('summaryAddonPrice').innerText = `$${addonPrice.toLocaleString()}`;
            document.getElementById('summaryTotalPrice').innerText = `$${total.toLocaleString()}`;

            return { stylePrice, addonPrice, total };
        }

        // ==========================================
        // 5. 表單提交與 Firebase 異步資料儲存
        // ==========================================
        const bookingForm = document.getElementById('bookingForm');
        const submitBtn = document.getElementById('submitBtn');
        const successAlert = document.getElementById('successAlert');
        const errorAlert = document.getElementById('errorAlert');

        bookingForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 隱藏警示
            successAlert.style.display = 'none';
            errorAlert.style.display = 'none';

            // 防呆機制：必須選取主款式
            if (!currentSelection.selectedStyle) {
                errorAlert.innerText = "請先選擇一項主要核心美甲款式！";
                errorAlert.style.display = 'block';
                return;
            }

            // 鎖定按鈕防止重複觸發
            submitBtn.disabled = true;
            submitBtn.innerText = "資料同步中...";

            // 結構化封裝預約表單數據
            const prices = calculateTotal();
            const bookingData = {
                clientName: document.getElementById('clientName').value.trim(),
                clientPhone: document.getElementById('clientPhone').value.trim(),
                bookingDate: document.getElementById('bookingDate').value,
                bookingTime: document.getElementById('bookingTime').value,
                notes: document.getElementById('notes').value.trim(),
                selectedStyle: currentSelection.selectedStyle.name,
                selectedAddons: Array.from(currentSelection.selectedAddons).map(item => item.name),
                priceCalculations: {
                    basePrice: prices.stylePrice,
                    addonPrice: prices.addonPrice,
                    totalPrice: prices.total
                },
                createdAt: serverTimestamp() // 使用 Firebase 伺服器時間戳
            };

            try {
                // 將結構化 JSON 資料寫入 Firebase Firestore 的 "nail_bookings" 集合
                await addDoc(collection(db, "nail_bookings"), bookingData);
                
                // 成功反饋與表單重置
                successAlert.style.display = 'block';
                bookingForm.reset();
                document.querySelectorAll('.style-card').forEach(card => card.classList.remove('selected'));
                currentSelection.selectedStyle = null;
                currentSelection.selectedAddons.clear();
                calculateTotal();

            } catch (error) {
                console.error("Firebase Error: ", error);
                errorAlert.innerText = "寫入雲端失敗，請確認 Firebase Config 是否配置正確。";
                errorAlert.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "送出預約申請";
            }
        });
    </script>
</body>
</html>
