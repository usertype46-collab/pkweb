<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>神の指藝 - 後台管理系統</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #7B2CBF; padding-bottom: 10px; color: #3D2C38; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; color: white; }
        .btn-add { background: #4CAF50; }
        .btn-save { background: #7B2CBF; width: 100%; margin-top: 20px; font-size: 1.1rem; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>後台管理系統</h2>
    
    <div class="form-group">
        <label>標題</label>
        <input type="text" id="sysTitle">
    </div>
    <div class="form-group">
        <label>副標題</label>
        <input type="text" id="sysSubtitle">
    </div>

    <h3>美甲款式管理</h3>
    <table id="styleTable">
        <thead><tr><th>名稱</th><th>價格</th><th>操作</th></tr></thead>
        <tbody></tbody>
    </table>
    <button class="btn btn-add" onclick="addRow('styleTable')">+ 新增款式</button>

    <h3>附加服務管理</h3>
    <table id="addonTable">
        <thead><tr><th>名稱</th><th>價格</th><th>操作</th></tr></thead>
        <tbody></tbody>
    </table>
    <button class="btn btn-add" onclick="addRow('addonTable')">+ 新增服務</button>

    <h3>保固條款 (一行一條)</h3>
    <textarea id="warranty" rows="5"></textarea>

    <button class="btn btn-save" onclick="saveData()">儲存所有設定</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- 請確保此處與您的專案設定一致 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAvLmHzZK6HwMLJFo3JyzY_T_azpElk1Lc",
        authDomain: "beautiful-68dbc.firebaseapp.com",
        projectId: "beautiful-68dbc",
        // ... (其他參數保持不變)
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadData() {
        const docSnap = await getDoc(doc(db, "system_settings", "booking_config"));
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('sysTitle').value = data.title || "";
            document.getElementById('sysSubtitle').value = data.subtitle || "";
            document.getElementById('warranty').value = (data.warrantyTerms || []).join('\n');
            
            populateTable('styleTable', data.nailStyles || []);
            populateTable('addonTable', data.addonServices || []);
        }
    }

    function populateTable(tableId, items) {
        const tbody = document.querySelector(`#${tableId} tbody`);
        tbody.innerHTML = '';
        items.forEach(item => {
            tbody.innerHTML += `<tr>
                <td><input type="text" class="name" value="${item.name}"></td>
                <td><input type="number" class="price" value="${item.price}"></td>
                <td><button onclick="this.parentElement.parentElement.remove()">刪除</button></td>
            </tr>`;
        });
    }

    window.addRow = (tableId) => {
        const tbody = document.querySelector(`#${tableId} tbody`);
        tbody.innerHTML += `<tr>
            <td><input type="text" class="name"></td>
            <td><input type="number" class="price"></td>
            <td><button onclick="this.parentElement.parentElement.remove()">刪除</button></td>
        </tr>`;
    }

    window.saveData = async () => {
        const getTableData = (tableId) => {
            const rows = document.querySelectorAll(`#${tableId} tbody tr`);
            return Array.from(rows).map((row, i) => ({
                id: `${tableId.replace('Table', '')}_${i}`,
                name: row.querySelector('.name').value,
                price: parseInt(row.querySelector('.price').value)
            }));
        };

        const data = {
            title: document.getElementById('sysTitle').value,
            subtitle: document.getElementById('sysSubtitle').value,
            nailStyles: getTableData('styleTable'),
            addonServices: getTableData('addonTable'),
            warrantyTerms: document.getElementById('warranty').value.split('\n').filter(t => t.trim() !== "")
        };

        await setDoc(doc(db, "system_settings", "booking_config"), data, { merge: true });
        alert("儲存成功！");
    };

    loadData();
</script>
</body>
</html>
