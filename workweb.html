<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 全球烤漆代工報價與廠內型號管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 20px; }
        .nav-tabs .nav-link.active { font-weight: bold; color: #0d6efd; border-bottom: 3px solid #0d6efd; }
        .table-responsive { max-height: 500px; overflow-y: auto; }
        .result-box { background-color: #e9ecef; padding: 15px; border-radius: 8px; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container py-4">
    <h2 class="text-center mb-4">🏭 烤漆代工報價與型號管理系統 (Firebase 同步版)</h2>

    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="calc-tab" data-bs-toggle="tab" data-bs-target="#calc" type="button">1. 報價試算與型號建立</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button">2. 歷史紀錄與總價查閱</button>
        </li>
    </ul>

    <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="calc" role="tabpanel">
            <div class="row">
                <div class="col-lg-8">
                    <div class="card p-4">
                        <h4 class="mb-3">輸入試算參數</h4>
                        <form id="calcForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">工件型號 (Model)</label>
                                    <input type="text" class="form-control" id="modelNo" required placeholder="例如: P-2026-A">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">工作內容 / 備註</label>
                                    <input type="text" class="form-control" id="workNote" placeholder="例如: 雙面平光黑烤漆">
                                </div>

                                <h5 class="mt-4 border-bottom pb-2">物理與粉末參數</h5>
                                <div class="col-md-3">
                                    <label class="form-label">表面積 (m²)</label>
                                    <input type="number" step="0.01" class="form-control" id="area" required value="1.5">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">目標膜厚 (μm)</label>
                                    <input type="number" class="form-control" id="thickness" required value="60">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">粉末比重 (g/cm³)</label>
                                    <input type="number" step="0.01" class="form-control" id="density" required value="1.5" title="一般約 1.2~1.8">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">上粉率 (%)</label>
                                    <input type="number" class="form-control" id="efficiency" required value="60" title="計算廢粉因素">
                                </div>

                                <h5 class="mt-4 border-bottom pb-2">成本與耗材參數</h5>
                                <div class="col-md-3">
                                    <label class="form-label">粉末單價 (元/kg)</label>
                                    <input type="number" class="form-control" id="powderPrice" required value="150">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">總工時 (小時)</label>
                                    <input type="number" step="0.1" class="form-control" id="workHours" required value="0.5">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">人工費率 (元/小時)</label>
                                    <input type="number" class="form-control" id="hourlyRate" required value="250">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">重工風險率 (%)</label>
                                    <input type="number" class="form-control" id="reworkRate" required value="5">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">包裝費用 (元)</label>
                                    <input type="number" class="form-control" id="packagingCost" required value="20">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">其他耗材/前處理 (元)</label>
                                    <input type="number" class="form-control" id="consumablesCost" required value="15">
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="button" class="btn btn-primary w-100" id="btnCalculate">開始試算</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card p-4 sticky-top" style="top: 20px;">
                        <h4 class="mb-3">試算結果</h4>
                        <div class="result-box mb-3">
                            <p><strong>單件用粉量：</strong> <span id="resPowderKg" class="text-danger fw-bold">0.00</span> kg</p>
                            <p><strong>粉末材料費：</strong> <span id="resMaterialCost">0.00</span> 元</p>
                            <p><strong>人工費用：</strong> <span id="resLaborCost">0.00</span> 元</p>
                            <p><strong>重工攤提費用：</strong> <span id="resReworkCost">0.00</span> 元</p>
                            <hr>
                            <h5 class="text-primary fw-bold">單件總報價： <span id="resTotalCost">0.00</span> 元</h5>
                        </div>
                        <button type="button" class="btn btn-success w-100" id="btnSaveData" disabled>將紀錄儲存至 Firebase</button>
                        <div id="saveStatus" class="mt-2 text-center text-success fw-bold"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="history" role="tabpanel">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="m-0">雲端報價資料庫</h4>
                    <input type="text" class="form-control w-25" id="searchInput" placeholder="輸入型號搜尋...">
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-bordered align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>日期</th>
                                <th>型號</th>
                                <th>面積(m²) / 膜厚(μm)</th>
                                <th>用粉量(kg)</th>
                                <th>工時(hr)</th>
                                <th>材料費</th>
                                <th>加工及耗材費</th>
                                <th>單件總價</th>
                                <th>備註</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <tr><td colspan="10" class="text-center">載入中或尚無資料...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 使用者提供的 Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyAkZmxSVbQfSO76dNNeGG35-ehCfxYT6K8",
      authDomain: "workweb-15a02.firebaseapp.com",
      databaseURL: "https://workweb-15a02-default-rtdb.firebaseio.com",
      projectId: "workweb-15a02",
      storageBucket: "workweb-15a02.firebasestorage.app",
      messagingSenderId: "942812868932",
      appId: "1:942812868932:web:e6e41c2aa9c093636b6711",
      measurementId: "G-YSNPSTCXNL"
    };

    // 初始化 Firebase 與 Realtime Database
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const quotesRef = ref(db, 'coating_quotes');

    // 全域變數暫存試算結果
    let currentCalcData = null;

    // 1. 試算邏輯
    document.getElementById('btnCalculate').addEventListener('click', () => {
        // 取得所有輸入值
        const modelNo = document.getElementById('modelNo').value;
        const workNote = document.getElementById('workNote').value;
        const area = parseFloat(document.getElementById('area').value);
        const thickness = parseFloat(document.getElementById('thickness').value);
        const density = parseFloat(document.getElementById('density').value);
        const efficiency = parseFloat(document.getElementById('efficiency').value) / 100;
        const powderPrice = parseFloat(document.getElementById('powderPrice').value);
        const workHours = parseFloat(document.getElementById('workHours').value);
        const hourlyRate = parseFloat(document.getElementById('hourlyRate').value);
        const reworkRate = parseFloat(document.getElementById('reworkRate').value) / 100;
        const packagingCost = parseFloat(document.getElementById('packagingCost').value);
        const consumablesCost = parseFloat(document.getElementById('consumablesCost').value);

        if(!modelNo) { alert("請輸入工件型號！"); return; }

        // 公式計算：粉末重量(kg) = (面積 * 膜厚 * 比重) / (10 * 上粉率)
        // 註: 這是考量單位換算的業界常用公式
        const powderKg = (area * thickness * density) / (10 * (efficiency * 100)); 
        
        // 成本拆解
        const materialCost = powderKg * powderPrice;
        const laborCost = workHours * hourlyRate;
        const baseProcessCost = laborCost + packagingCost + consumablesCost;
        
        // 重工成本 (材料與人工因不良率產生的損耗攤提)
        const reworkCost = (materialCost + laborCost) * reworkRate;
        
        // 總價
        const totalCost = materialCost + baseProcessCost + reworkCost;

        // 顯示結果
        document.getElementById('resPowderKg').innerText = powderKg.toFixed(4);
        document.getElementById('resMaterialCost').innerText = materialCost.toFixed(2);
        document.getElementById('resLaborCost').innerText = laborCost.toFixed(2);
        document.getElementById('resReworkCost').innerText = reworkCost.toFixed(2);
        document.getElementById('resTotalCost').innerText = totalCost.toFixed(2);

        // 建立待存物件
        currentCalcData = {
            modelNo, workNote, area, thickness, density, efficiency,
            powderPrice, workHours, hourlyRate, reworkRate,
            packagingCost, consumablesCost, powderKg, materialCost,
            laborCost, reworkCost, baseProcessCost, totalCost,
            timestamp: new Date().toISOString()
        };

        // 啟用儲存按鈕
        document.getElementById('btnSaveData').disabled = false;
        document.getElementById('saveStatus').innerText = "試算完成，可上傳至雲端。";
    });

    // 2. 儲存資料至 Firebase
    document.getElementById('btnSaveData').addEventListener('click', () => {
        if (!currentCalcData) return;
        
        const newRecordRef = push(quotesRef);
        set(newRecordRef, currentCalcData).then(() => {
            document.getElementById('saveStatus').innerText = "✅ 已成功同步至 Firebase！";
            document.getElementById('btnSaveData').disabled = true;
            setTimeout(() => { document.getElementById('saveStatus').innerText = ""; }, 3000);
        }).catch((error) => {
            document.getElementById('saveStatus').innerText = "❌ 儲存失敗: " + error;
        });
    });

    // 3. 即時讀取與型號查閱 (自動分類與表格生成)
    let allRecords = {};
    
    onValue(quotesRef, (snapshot) => {
        const data = snapshot.val();
        allRecords = data || {};
        renderTable(allRecords);
    });

    function renderTable(dataObj, filterModel = "") {
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = "";
        
        const keys = Object.keys(dataObj);
        if (keys.length === 0) {
            tbody.innerHTML = "<tr><td colspan='10' class='text-center'>資料庫尚無紀錄</td></tr>";
            return;
        }

        // 將物件轉為陣列並以時間反序排序 (最新的在最上面)
        const recordsArray = keys.map(key => ({ id: key, ...dataObj[key] }))
                                 .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        recordsArray.forEach(record => {
            // 型號搜尋過濾
            if (filterModel && !record.modelNo.toLowerCase().includes(filterModel.toLowerCase())) {
                return; 
            }

            const tr = document.createElement('tr');
            const dateStr = new Date(record.timestamp).toLocaleString('zh-TW', {hour12: false});
            
            tr.innerHTML = `
                <td>${dateStr}</td>
                <td><strong>${record.modelNo}</strong></td>
                <td>${record.area} m² / ${record.thickness} μm</td>
                <td class="text-danger fw-bold">${record.powderKg.toFixed(4)}</td>
                <td>${record.workHours}</td>
                <td>$${record.materialCost.toFixed(2)}</td>
                <td>$${record.baseProcessCost.toFixed(2)}</td>
                <td class="text-primary fw-bold">$${record.totalCost.toFixed(2)}</td>
                <td>${record.workNote || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${record.id}">刪除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. 搜尋功能綁定
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderTable(allRecords, e.target.value);
    });

    // 5. 刪除紀錄功能 (事件委派)
    document.getElementById('dataTableBody').addEventListener('click', (e) => {
        if (e.target.classList.contains('btn-delete')) {
            const id = e.target.getAttribute('data-id');
            if (confirm("確定要刪除這筆報價紀錄嗎？此動作無法復原。")) {
                const recordRef = ref(db, `coating_quotes/${id}`);
                remove(recordRef);
            }
        }
    });

</script>
</body>
</html>
