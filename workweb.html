<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 烤漆廠智能代工報價與材積試算系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .input-group label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.25rem; }
        .input-group input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.875rem; }
        .input-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
    </style>
</head>
<body class="p-6">

<div class="max-w-7xl mx-auto space-y-6">
    <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-600">
        <h1 class="text-2xl font-bold text-gray-800">🏭 2026 全球烤漆代工報價與廠務試算中心</h1>
        <p class="text-sm text-gray-500 mt-1">整合工件材積、粉末用量、重工廢粉計算，並即時同步至 Firebase 雲端資料庫</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-lg font-bold text-gray-700 border-b pb-2 mb-4">📝 各項參數與材積輸入 (試算區)</h2>
            
            <div class="space-y-4">
                <div class="input-group">
                    <label>工件型號 / 廠區代號</label>
                    <input type="text" id="model" placeholder="例如: Part-A-2026">
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <div class="input-group">
                        <label>長 (cm)</label>
                        <input type="number" id="length" value="10">
                    </div>
                    <div class="input-group">
                        <label>寬 (cm)</label>
                        <input type="number" id="width" value="10">
                    </div>
                    <div class="input-group">
                        <label>高 (cm)</label>
                        <input type="number" id="height" value="10">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="input-group">
                        <label>粉末單價 ($/kg)</label>
                        <input type="number" id="powderPrice" value="150">
                    </div>
                    <div class="input-group">
                        <label>每㎡耗粉量 (kg)</label>
                        <input type="number" id="usageRate" value="0.25" step="0.01">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="input-group">
                        <label>廢粉/損耗率 (%)</label>
                        <input type="number" id="wasteRate" value="15">
                    </div>
                    <div class="input-group">
                        <label>重工風險率 (%)</label>
                        <input type="number" id="reworkRate" value="5">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="input-group">
                        <label>單件工時 (小時)</label>
                        <input type="number" id="laborHours" value="0.5" step="0.1">
                    </div>
                    <div class="input-group">
                        <label>人工時薪 ($/hr)</label>
                        <input type="number" id="laborRate" value="200">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="input-group">
                        <label>前處理/其他耗材 ($)</label>
                        <input type="number" id="consumables" value="10">
                    </div>
                    <div class="input-group">
                        <label>包裝費用 ($)</label>
                        <input type="number" id="packaging" value="5">
                    </div>
                </div>

                <div class="input-group">
                    <label>預期利潤率 (%)</label>
                    <input type="number" id="profitMargin" value="20">
                </div>

                <div class="input-group">
                    <label>備註 / 計算因素備註</label>
                    <input type="text" id="remarks" placeholder="例如: 特殊耐候粉末、客戶要求加厚">
                </div>

                <button id="btn-calc" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-2 transition">
                    ⚡ 執行精密試算
                </button>
            </div>
        </div>

        <div class="lg:col-span-1 bg-white p-6 rounded-lg shadow-md flex flex-col justify-between">
            <div>
                <h2 class="text-lg font-bold text-gray-700 border-b pb-2 mb-4">📊 試算結果解析</h2>
                
                <div class="space-y-4 text-sm text-gray-600">
                    <div class="flex justify-between border-b pb-1">
                        <span>工件表面積:</span>
                        <span id="res-area" class="font-bold text-gray-900">0 ㎡</span>
                    </div>
                    <div class="flex justify-between border-b pb-1">
                        <span>理論粉末用量 (含損耗):</span>
                        <span id="res-powder-kg" class="font-bold text-gray-900">0 kg</span>
                    </div>
                    <div class="flex justify-between border-b pb-1">
                        <span>粉末材料成本:</span>
                        <span id="res-powder-cost" class="font-bold text-gray-900">$0</span>
                    </div>
                    <div class="flex justify-between border-b pb-1">
                        <span>人工成本:</span>
                        <span id="res-labor" class="font-bold text-gray-900">$0</span>
                    </div>
                    <div class="flex justify-between border-b pb-1">
                        <span>基礎成本 (含耗材/包裝):</span>
                        <span id="res-base-cost" class="font-bold text-gray-900">$0</span>
                    </div>
                    <div class="flex justify-between border-b pb-1">
                        <span>重工風險攤提成本:</span>
                        <span id="res-rework-cost" class="font-bold text-gray-900">$0</span>
                    </div>
                </div>

                <div class="mt-6 bg-blue-50 p-4 rounded-lg border border-blue-200">
                    <div class="text-xs text-blue-600 font-bold mb-1">系統建議單件最終報價 (含利潤)</div>
                    <div id="res-final-price" class="text-4xl font-black text-blue-700">$0</div>
                </div>
            </div>

            <button id="btn-save" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mt-6 transition disabled:opacity-50" disabled>
                ☁️ 儲存紀錄至 Firebase
            </button>
        </div>

        <div class="lg:col-span-1 bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-lg font-bold text-gray-700 border-b pb-2 mb-4">📈 同型號總價查閱與自動分類</h2>
            <div id="summary-container" class="space-y-3 overflow-y-auto max-h-[450px]">
                <p class="text-sm text-gray-500">尚無雲端資料載入...</p>
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
        <h2 class="text-lg font-bold text-gray-700 border-b pb-2 mb-4">🗄️ 雲端報價歷史紀錄 (Firebase 同步)</h2>
        <table class="min-w-full text-left text-sm text-gray-600">
            <thead class="bg-gray-100 text-gray-700 uppercase">
                <tr>
                    <th class="px-4 py-3">時間</th>
                    <th class="px-4 py-3">型號</th>
                    <th class="px-4 py-3">表面積(㎡)</th>
                    <th class="px-4 py-3">粉末量(kg)</th>
                    <th class="px-4 py-3">總成本</th>
                    <th class="px-4 py-3">最終報價</th>
                    <th class="px-4 py-3">備註</th>
                    <th class="px-4 py-3">操作</th>
                </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-200">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // 您提供的 Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyAkZmxSVbQfSO76dNNeGG35-ehCfxYT6K8",
    authDomain: "workweb-15a02.firebaseapp.com",
    databaseURL: "https://workweb-15a02-default-rtdb.firebaseio.com",
    projectId: "workweb-15a02",
    storageBucket: "workweb-15a02.firebasestorage.app",
    messagingSenderId: "942812868932",
    appId: "1:942812868932:web:e6e41c2aa9c093636b6711",
    measurementId: "G-YSNPSTCXNL"
  };

  // 初始化 Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'quotes_2026');

  // 全域變數儲存當前試算結果
  let currentCalculation = null;

  // 取得 DOM 元素
  const btnCalc = document.getElementById('btn-calc');
  const btnSave = document.getElementById('btn-save');
  
  // 試算功能
  btnCalc.addEventListener('click', () => {
      const model = document.getElementById('model').value || "未命名型號";
      const L = parseFloat(document.getElementById('length').value) || 0;
      const W = parseFloat(document.getElementById('width').value) || 0;
      const H = parseFloat(document.getElementById('height').value) || 0;
      
      const powderPrice = parseFloat(document.getElementById('powderPrice').value) || 0;
      const usageRate = parseFloat(document.getElementById('usageRate').value) || 0;
      const wasteRate = parseFloat(document.getElementById('wasteRate').value) || 0;
      const reworkRate = parseFloat(document.getElementById('reworkRate').value) || 0;
      
      const laborHours = parseFloat(document.getElementById('laborHours').value) || 0;
      const laborRate = parseFloat(document.getElementById('laborRate').value) || 0;
      const consumables = parseFloat(document.getElementById('consumables').value) || 0;
      const packaging = parseFloat(document.getElementById('packaging').value) || 0;
      const profitMargin = parseFloat(document.getElementById('profitMargin').value) || 0;
      const remarks = document.getElementById('remarks').value || "無";

      // 1. 計算表面積 (平方米 m²)，假設長寬高為公分 (cm)
      // 公式: 2*(長*寬 + 長*高 + 寬*高) / 10000
      const area = (2 * (L * W + L * H + W * H)) / 10000;

      // 2. 粉末用量 (kg) = 面積 * 耗粉率 * (1 + 廢粉率)
      const powderKg = area * usageRate * (1 + (wasteRate / 100));
      const powderCost = powderKg * powderPrice;

      // 3. 人工成本
      const laborCost = laborHours * laborRate;

      // 4. 基礎成本 = 粉末 + 人工 + 耗材 + 包裝
      const baseCost = powderCost + laborCost + consumables + packaging;

      // 5. 重工攤提成本 = 基礎成本 * 重工率
      const reworkCost = baseCost * (reworkRate / 100);

      // 6. 總成本
      const totalCost = baseCost + reworkCost;

      // 7. 最終報價 = 總成本 * (1 + 利潤率)
      const finalPrice = totalCost * (1 + (profitMargin / 100));

      // 顯示到介面上
      document.getElementById('res-area').innerText = area.toFixed(4) + ' ㎡';
      document.getElementById('res-powder-kg').innerText = powderKg.toFixed(4) + ' kg';
      document.getElementById('res-powder-cost').innerText = '$' + powderCost.toFixed(2);
      document.getElementById('res-labor').innerText = '$' + laborCost.toFixed(2);
      document.getElementById('res-base-cost').innerText = '$' + baseCost.toFixed(2);
      document.getElementById('res-rework-cost').innerText = '$' + reworkCost.toFixed(2);
      document.getElementById('res-final-price').innerText = '$' + Math.ceil(finalPrice); // 報價通常向上取整

      // 存入全域變數等待上傳
      currentCalculation = {
          model: model,
          timestamp: new Date().toISOString(),
          dimensions: `${L}x${W}x${H}`,
          area: area,
          powderKg: powderKg,
          totalCost: totalCost,
          finalPrice: Math.ceil(finalPrice),
          remarks: remarks
      };

      // 啟用儲存按鈕
      btnSave.disabled = false;
  });

  // 儲存資料到 Firebase
  btnSave.addEventListener('click', () => {
      if(!currentCalculation) return;
      
      const newRecordRef = push(dbRef);
      set(newRecordRef, currentCalculation)
        .then(() => {
            alert("✅ 報價紀錄已成功同步至 Firebase！");
            btnSave.disabled = true; // 儲存後禁用避免重複點擊
        })
        .catch((error) => {
            console.error("寫入失敗:", error);
            alert("寫入失敗，請確認 Firebase 資料庫安全性規則 (Rules) 是否允許讀寫！\n(將 rules 設為 .read: true, .write: true)");
        });
  });

  // 即時監聽 Firebase 資料庫變化 (讀取與更新)
  onValue(dbRef, (snapshot) => {
      const data = snapshot.val();
      const tbody = document.getElementById('table-body');
      const summaryContainer = document.getElementById('summary-container');
      
      tbody.innerHTML = '';
      summaryContainer.innerHTML = '';

      if (!data) {
          tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-4 text-center text-gray-500">資料庫中無紀錄</td></tr>';
          summaryContainer.innerHTML = '<p class="text-sm text-gray-500">尚無資料以供分類</p>';
          return;
      }

      const modelSummary = {};

      // 渲染表格與收集分類數據
      Object.entries(data).forEach(([key, record]) => {
          // 渲染表格
          const tr = document.createElement('tr');
          const dateStr = new Date(record.timestamp).toLocaleString('zh-TW');
          tr.innerHTML = `
              <td class="px-4 py-3">${dateStr}</td>
              <td class="px-4 py-3 font-bold text-blue-600">${record.model}</td>
              <td class="px-4 py-3">${record.area.toFixed(3)}</td>
              <td class="px-4 py-3">${record.powderKg.toFixed(3)}</td>
              <td class="px-4 py-3">$${record.totalCost.toFixed(2)}</td>
              <td class="px-4 py-3 font-bold text-red-600">$${record.finalPrice}</td>
              <td class="px-4 py-3">${record.remarks}</td>
              <td class="px-4 py-3">
                  <button class="btn-delete bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-xs" data-id="${key}">刪除</button>
              </td>
          `;
          tbody.appendChild(tr);

          // 收集同型號數據以供總價分類查閱
          if (!modelSummary[record.model]) {
              modelSummary[record.model] = { count: 0, totalPowder: 0, totalRevenue: 0 };
          }
          modelSummary[record.model].count += 1;
          modelSummary[record.model].totalPowder += record.powderKg;
          modelSummary[record.model].totalRevenue += record.finalPrice;
      });

      // 渲染同型號總價自動分類區
      Object.entries(modelSummary).forEach(([modelName, stats]) => {
          const div = document.createElement('div');
          div.className = "bg-gray-50 p-3 rounded border border-gray-200 flex justify-between items-center";
          div.innerHTML = `
            <div>
                <div class="font-bold text-gray-800">${modelName}</div>
                <div class="text-xs text-gray-500">共 ${stats.count} 筆紀錄 | 總用粉 ${stats.totalPowder.toFixed(2)} kg</div>
            </div>
            <div class="text-lg font-black text-blue-700">$${stats.totalRevenue.toLocaleString()}</div>
          `;
          summaryContainer.appendChild(div);
      });

      // 綁定刪除按鈕事件
      document.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
              const id = e.target.getAttribute('data-id');
              if(confirm('確定要刪除這筆報價紀錄嗎？')) {
                  remove(ref(db, `quotes_2026/${id}`));
              }
          });
      });
  });
</script>
</body>
</html>
